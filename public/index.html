<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Restaurant 't Rijnsburgje</title>
<link rel="stylesheet" href="/styles.css">
<style>
:root{
  /* Afgeleid van styles.css — geen losse kleuren */
  --bg:        var(--color-bg);
  --surface:   color-mix(in srgb, var(--color-bg) 40%, white);
  --surface2:  var(--color-bg);
  --border:    color-mix(in srgb, var(--color-dark) 14%, transparent);
  --border2:   color-mix(in srgb, var(--color-dark) 26%, transparent);
  --text:      var(--color-dark);
  --text2:     var(--color-text-muted);
  --text3:     color-mix(in srgb, var(--color-text-muted) 60%, transparent);
  --accent:    var(--color-primary);
  --accent2:   var(--color-primary);
  --accent-bg: color-mix(in srgb, var(--color-primary) 10%, white);
  --green:     var(--color-accent-text);
  --green-bg:  color-mix(in srgb, var(--color-accent) 22%, white);
  --blue:      var(--color-dark);
  --blue-bg:   color-mix(in srgb, var(--color-dark) 9%, white);
  --red:       var(--color-primary);
  --red-bg:    color-mix(in srgb, var(--color-primary) 10%, white);
  --gold:      var(--color-accent-text);
  --gold-bg:   color-mix(in srgb, var(--color-accent) 18%, white);
  --radius:10px;--radius-lg:16px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
a{color:var(--accent);text-decoration:none}

/* ── Header ── */
#hdr{background:var(--color-dark);padding:16px 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
#hdr-inner{max-width:800px;margin:0 auto}
#hdr h1{font-size:21px;font-weight:700;color:var(--color-bg);letter-spacing:-.02em}
#hdr h1 span{font-weight:400;font-style:italic}
#hdr-sub{font-size:12px;color:var(--color-bg);margin:4px 0 14px;opacity:.65}
#tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:0;background:transparent}
#tabs::-webkit-scrollbar{display:none}
.tb{padding:10px 16px;background:transparent;color:var(--color-bg);opacity:.6;border:none;font-size:13px;font-weight:500;border-radius:8px 8px 0 0;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.tb.on{background:var(--bg);color:var(--text);font-weight:600;opacity:1;box-shadow:inset 0 3px 0 var(--color-primary)}

/* ── Content ── */
#content{max-width:800px;margin:0 auto;padding:24px 16px 100px}

/* ── Recipe cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px}

/* Feed-modus: één kolom, gecentreerd, groot beeld */
.feed-grid{grid-template-columns:1fr;max-width:520px;margin:0 auto;gap:28px}
.feed-grid .rcard-img{height:300px}
.feed-grid .rcard{box-shadow:var(--shadow-lg)}
.feed-grid .rcard:hover{transform:none;box-shadow:var(--shadow-lg)}

/* Zoekresultaten lijstweergave */
.search-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.srow{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:box-shadow .15s}
.srow:hover{box-shadow:var(--shadow)}
.srow-thumb{width:60px;height:60px;border-radius:8px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.srow-thumb img{width:100%;height:100%;object-fit:cover}
.srow-body{flex:1;min-width:0}
.srow-title{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.srow-meta{font-size:11px;color:var(--text3);margin-top:2px}
.srow-acts{display:flex;gap:4px;flex-shrink:0;align-items:center}

.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s,transform .2s;position:relative;cursor:pointer}
.rcard:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.rcard.sel{border:2px solid var(--accent);box-shadow:0 4px 24px rgba(0,0,0,.14)}
.rcard-img{height:168px;background:linear-gradient(135deg,var(--surface2) 0%,var(--border2) 100%);display:flex;align-items:center;justify-content:center;position:relative}
.rcard-img-emoji{font-size:56px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.12))}
.sel-badge{position:absolute;top:12px;right:12px;background:var(--accent);color:var(--color-bg);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.tijd-sticker{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.62);backdrop-filter:blur(6px);color:var(--color-bg);font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.3px;pointer-events:none}
.week-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:18px;box-shadow:var(--shadow)}
.rcard-body{padding:18px 18px 14px}
.rcard-labels{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.lbl{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;letter-spacing:.03em;display:inline-flex;align-items:center;gap:3px}
.lbl-k{background:var(--gold-bg);color:var(--gold);border:1px solid var(--border)}
.lbl-c{background:var(--blue-bg);color:var(--blue);border:1px solid var(--border)}
.lbl-n{background:var(--red-bg);color:var(--red);border:1px solid var(--border)}
.lbl-t{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.rcard-title{font-size:18px;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:6px}
.rcard-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:12px}
.rcard-note{background:var(--gold-bg);border-left:3px solid var(--gold);padding:6px 10px;font-size:12px;color:var(--gold);margin-bottom:12px;border-radius:0 6px 6px 0;font-style:italic}
.rcard-meta{display:flex;justify-content:space-between;align-items:center}
.stars{display:flex;gap:2px}
.star{font-size:16px;color:var(--border2);cursor:pointer;transition:color .1s;line-height:1}
.star.on{color:var(--accent)}
.rcard-pers{font-size:12px;color:var(--text3)}
.rcard-divider{height:1px;background:var(--border);margin:0 18px}
.rcard-expand{padding:10px 18px;font-size:12px;color:var(--text2);font-weight:500;display:flex;justify-content:space-between;cursor:pointer;user-select:none;letter-spacing:.02em;min-height:40px;align-items:center}
.rcard-expand:hover{background:var(--surface2)}
.rcard-detail{padding:14px 18px;background:var(--bg);display:none;border-top:1px solid var(--border)}
.rcard-detail.open{display:block}
.rcard-detail h4{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin:0 0 8px}
.rcard-detail ul,.rcard-detail ol{padding:0 0 0 18px;margin:0 0 14px}
.rcard-detail li{font-size:13px;color:var(--text);margin-bottom:5px;line-height:1.55}
.rcard-actions{padding:10px 14px 14px;display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;border-top:1px solid var(--border);-webkit-overflow-scrolling:touch}
.rcard-actions .btn{padding:7px 10px;font-size:13px;white-space:nowrap;flex-shrink:0}

/* ── Buttons ── */
.btn{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;letter-spacing:.01em;display:inline-flex;align-items:center;gap:5px;justify-content:center;min-height:40px}
.btn-dark{background:var(--color-dark);color:var(--color-bg)}
.btn-dark:hover{opacity:.85}
.btn-accent{background:var(--color-primary);color:var(--color-bg)}
.btn-accent:hover{opacity:.88}
.btn-saved{background:var(--green-bg);color:var(--green)}
.btn-light{background:var(--surface2);color:var(--text2)}
.btn-light:hover{background:var(--border)}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--border)}
.btn-w{width:100%;padding:14px 0;font-size:14px;border-radius:var(--radius);min-height:48px}
.btn-w2{width:100%;padding:13px 0;font-size:14px;border-radius:var(--radius);margin-top:8px;min-height:48px}

/* ── Inputs ── */
.inp{padding:12px 14px;border-radius:var(--radius);border:1.5px solid var(--border);font-size:15px;color:var(--text);outline:none;background:var(--surface);width:100%;transition:border .15s}
.inp:focus{border-color:var(--accent)}
textarea.inp{resize:vertical}

/* ── Filter bar ── */
.filter-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
.filter-wrap h3{font-size:13px;color:var(--text);margin-bottom:10px;font-weight:700}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fb{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s;min-height:34px}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.on{background:var(--accent);color:var(--color-bg);border-color:var(--accent)}
.fb.nnek{background:var(--red-bg);color:var(--red);border-color:var(--border)}
.fb.nnek.on{background:var(--red);color:var(--color-bg)}

/* ── Search box ── */
.search-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
.search-wrap h2{font-size:20px;margin-bottom:16px;color:var(--text)}
.mode-row{display:flex;gap:6px;margin-bottom:14px;background:var(--surface2);border-radius:var(--radius);padding:4px}
.mb{flex:1;padding:9px 0;border-radius:7px;background:transparent;color:var(--text2);border:none;font-size:13px;font-weight:500;transition:all .15s;min-height:40px}
.mb.on{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.search-hint{font-size:12px;color:var(--text3);margin-top:6px;font-style:italic}

/* ── Week menu stepper ── */
.stepper{display:inline-flex;align-items:center;gap:1px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stepper button{background:transparent;border:none;font-size:16px;color:var(--accent);width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:background .15s}
.stepper button:hover{background:var(--border)}
.stepper span{font-size:14px;color:var(--text);min-width:30px;text-align:center;font-weight:600}

/* ── Shopping list ── */
.afd-header{display:flex;align-items:center;gap:8px;margin:20px 0 8px}
.afd-title{font-weight:700;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}
.afd-line{flex:1;height:1px;background:var(--border)}
.afd-count{font-size:11px;color:var(--text3)}
.sitem{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:5px;transition:all .15s;background:var(--surface);min-height:48px}
.sitem:hover{border-color:var(--border2)}
.sitem.done{opacity:.5}
.scb{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;font-size:12px;color:var(--color-bg)}
.scb.done{border-color:var(--accent);background:var(--accent)}
.sname{flex:1;font-size:14px;color:var(--text);cursor:pointer;line-height:1.35}
.sname.done{text-decoration:line-through;color:var(--text3)}
.sqty{font-size:13px;color:var(--text2);font-weight:600;white-space:nowrap}
.sdel{background:transparent;border:none;color:var(--border2);font-size:14px;padding:4px 6px;cursor:pointer;transition:color .15s;flex-shrink:0}
.sdel:hover{color:var(--red)}
.done-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-top:20px}
.done-section h3{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px;cursor:pointer}
.done-items{display:flex;flex-direction:column;gap:4px}

/* ── Misc ── */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.box-info{background:var(--accent-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:14px;color:var(--text);line-height:1.5}
.box-err{background:var(--red-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:14px;color:var(--red);line-height:1.5}
.empty{text-align:center;padding:64px 20px;color:var(--text3);font-size:15px;line-height:1.6}
.empty span{font-size:44px;display:block;margin-bottom:14px}
.hint{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;font-style:italic;line-height:1.6}

/* ── Onboarding ── */
#ob-ovl{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.ob-kaart{background:var(--surface);border-radius:20px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 24px 72px rgba(0,0,0,.3)}
.ob-illu{height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.ob-emoji{font-size:64px;line-height:1}
@keyframes ob-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ob-slide-fwd{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes ob-slide-back{from{transform:translateX(-40px);opacity:0}to{transform:none;opacity:1}}
@keyframes ob-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.ob-fwd{animation:ob-slide-fwd .28s cubic-bezier(.4,0,.2,1)}
.ob-back{animation:ob-slide-back .28s cubic-bezier(.4,0,.2,1)}
.ob-body{padding:28px 24px 24px}
.ob-stap-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.ob-titel{font-size:23px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.25}
.ob-tekst{font-size:15px;color:var(--text2);line-height:1.65;margin-bottom:22px}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:22px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .2s}
.ob-dot.on{background:var(--accent);width:20px;border-radius:4px}
.ob-nav{display:flex;gap:10px}
.ob-mini-ui{background:var(--surface2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text2);margin-top:10px;border:1px solid var(--border)}
@keyframes spin{to{transform:rotate(360deg)}}
.laad-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:56px 20px;color:var(--text3);font-size:14px}
.laad-cirkel{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
.sec-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:8px}

/* ── Vrienden ── */
.friend-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:7px;box-shadow:var(--shadow);min-height:56px}
.friend-name{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.friend-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-bg);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--accent);flex-shrink:0}
.feed-auteur{font-size:12px;color:var(--text3);margin-bottom:6px;padding-left:2px}
.btn-like{background:transparent;border:none;cursor:pointer;font-size:14px;color:var(--text2);padding:6px 10px;border-radius:20px;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-like:hover{background:var(--red-bg);color:var(--red)}
.btn-like.liked{color:var(--red)}
.prog-bar{display:flex;gap:6px;margin-bottom:16px}
.prog-seg{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background .3s}
.prog-seg.done{background:var(--accent)}
.divider{height:1px;background:var(--border);margin:16px 0}

/* Modal */
#mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
#mov.open{display:flex}
#mbox{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:800px;box-shadow:var(--shadow-lg);max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
#mbox-scroll{flex:1;overflow-y:auto;padding:24px 20px 8px}
#mbox-footer{flex-shrink:0;padding:12px 20px;background:var(--surface);border-top:1px solid var(--border)}
.cat-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;margin:0 5px 7px 0;cursor:pointer;transition:all .15s}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.ak{background:var(--gold-bg);color:var(--gold);border-color:var(--border)}
.cat-btn.ac{background:var(--blue-bg);color:var(--blue);border-color:var(--border)}

@media(max-width:540px){
  .cards-grid{grid-template-columns:1fr}
  #hdr h1{font-size:18px}
  .tb{padding:9px 12px;font-size:12px}
  .rcard-img{height:200px}
}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:baseline;gap:8px">
        <h1>Restaurant <span>'t Rijnsburgje</span></h1>
        <span style="font-size:16px">🍳</span>
      </div>
      <button onclick="startOnboarding()" title="Rondleiding" style="background:none;border:none;cursor:pointer;padding:4px;opacity:.6;color:var(--color-bg);font-size:18px;line-height:1">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
    </div>
    <div id="hdr-sub">laden...</div>
    <nav id="tabs" role="tablist" aria-label="Navigatie">
      <button class="tb on" role="tab" aria-selected="true" onclick="setTab('recepten')">Recepten</button>
      <button class="tb" role="tab" aria-selected="false" onclick="setTab('zoeken')">Ontdekken</button>
      <button class="tb" role="tab" aria-selected="false" onclick="setTab('weekmenu')">Weekmenu</button>
      <button class="tb" role="tab" aria-selected="false" onclick="setTab('boodschappen')">Boodschappen</button>
      <button class="tb" role="tab" aria-selected="false" onclick="setTab('vrienden')">Vrienden</button>
      <button class="tb" role="tab" aria-selected="false" onclick="setTab('profiel')">Profiel</button>
    </nav>
  </div>
</div>

<div id="content"></div>

<!-- Edit modal -->
<div id="mov" onclick="closeOvl(event)">
  <div id="mbox">
    <div id="mbox-scroll">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <h2 style="font-size:17px;color:var(--text)">Recept bewerken</h2>
        <button onclick="sluitModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1">✕</button>
      </div>
      <span class="sec-label">Titel</span>
      <input id="m-titel" class="inp" placeholder="Naam van het recept" style="margin-bottom:12px">
      <span class="sec-label">Omschrijving</span>
      <input id="m-omschr" class="inp" placeholder="Korte omschrijving (1 zin)" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <div style="flex:1">
          <span class="sec-label">Personen</span>
          <input id="m-pers" class="inp" type="number" min="1" max="50" placeholder="4">
        </div>

function getMaandag(){
  const d=new Date();const dag=d.getDay()||7;
  const m=new Date(d);m.setDate(d.getDate()-(dag-1));m.setHours(0,0,0,0);
  return m.toISOString().split('T')[0];
}
function getVolgendeWeek(){
  const d=new Date(getMaandag()+'T00:00:00');
  d.setDate(d.getDate()+7);
  return d.toISOString().split('T')[0];
}
function formatMaandag(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
}
function weekLabel(maandag){
  const nu=getMaandag();
  const diff=Math.round((new Date(maandag+'T00:00:00')-new Date(nu+'T00:00:00'))/(7*24*3600*1000));
  if(diff===0)return'Deze week';
  if(diff===1)return'Volgende week';
  if(diff===-1)return'Vorige week';
  if(diff>1)return`Over ${diff} weken`;
  return`${-diff} weken geleden`;
}
function formatWeekBereik(maandag){
  const d=new Date(maandag+'T00:00:00');
  const z=new Date(d);z.setDate(d.getDate()+6);
  const fmtDag=dt=>dt.toLocaleDateString('nl-NL',{weekday:'long'});
  const fmtDatum=dt=>dt.toLocaleDateString('nl-NL',{day:'numeric',month:'long'});
  return`${fmtDag(d)} ${fmtDatum(d)} – ${fmtDag(z)} ${fmtDatum(z)} ${z.getFullYear()}`;
}

  const d=new Date((S.actieveWeek||getMaandag())+'T00:00:00');

// ── API — robust JSON extraction ──────────────────────────────────────────────
function extractJSON(txt){
  // Try to find JSON array, handle markdown fences and extra text
  let clean=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
  // Find outermost array
  let depth=0,start=-1,end=-1;
  for(let i=0;i<clean.length;i++){
    if(clean[i]==='['){if(start===-1)start=i;depth++;}
    else if(clean[i]===']'){depth--;if(depth===0){end=i;break;}}
  }
  if(start===-1||end===-1)throw new Error('Geen JSON array gevonden in antwoord');
  const slice=clean.slice(start,end+1);
  try{return JSON.parse(slice);}
  catch(e){
    // Try to fix common issues: unescaped quotes, trailing commas
    const fixed=slice.replace(/,\s*([}\]])/g,'$1').replace(/(['"])?([a-zA-Z0-9_]+)(['"])?:/g,'"$2":');
    return JSON.parse(fixed);
  }
}

async function callAPI(messages,search=false,maxTokens=1200,sysOverride=null){
  const sys=(sysOverride||SYS).replace('DATUM',new Date().toISOString().split('T')[0]);
  const body={model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system:sys,messages};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const resp=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok){
    if(resp.status===429)throw new Error('Te veel verzoeken — wacht even en probeer opnieuw');
    throw new Error('API fout: '+resp.status);
  }
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||'API fout');
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!txt)throw new Error('Geen antwoord ontvangen');
  return extractJSON(txt);
}

function normaliseer(parsed,fallbackBron){
  return parsed.map(r=>({...r,
    id:r.id||'r'+Date.now()+Math.random().toString(36).slice(2),
    tags:r.tags||[],keuken:r.keuken||'',categorie:parseCats(r.categorie),
    afbeelding:r.afbeelding||'',bron:r.bron||fallbackBron||'',
    tijdBereiding:parseInt(r.tijdBereiding)||0,
    tijdWacht:parseInt(r.tijdWacht)||0,
  }));
}
function fmtMin(m){
  if(!m||m<=0)return'';
  if(m<60)return m+'min';
  const u=Math.floor(m/60),rest=m%60;
  return rest?`${u}u${rest}`:`${u}u`;
}
function tijdSticker(r){
  const b=parseInt(r.tijdBereiding)||0;
  const w=parseInt(r.tijdWacht)||0;
  if(!b&&!w)return'';
  if(b&&w)return`⏱ ${fmtMin(b)}+${fmtMin(w)}`;
  return`⏱ ${fmtMin(b||w)}`;
}


async function zoekUrl(){
  const q=document.getElementById('inp-url')?.value?.trim();if(!q)return;
  S.zoekUrl=q;S.laden=true;S.fout='';S.urlFoutGeblokkeerd=false;S.resultaten=[];render();
  try{
    const pr=await fetch('/fetch?url='+encodeURIComponent(q));
    if(!pr.ok){const e=await pr.json().catch(()=>({}));throw new Error(e?.error||'Kon pagina niet ophalen');}
    const pd=await pr.json();

    // JSON-LD gevonden? Gebruik die direct — veel betrouwbaarder dan tekst
    if(pd.schema_recept){
      const sr=pd.schema_recept;
      const datum=new Date().toISOString().split('T')[0];
      const recept={
        id:'r'+Date.now()+Math.random().toString(36).slice(2),
        titel:sr.titel||'Recept',
        omschrijving:sr.omschrijving||'',
        personen:sr.personen||4,
        ingredienten:sr.ingredienten||[],
        stappen:sr.stappen||[],
        keuken:sr.keuken||'',
        categorie:'',tags:[],notities:'',
        bron:q,
        afbeelding:sr.afbeelding||pd.image||'',
        tijdBereiding:sr.tijdBereiding||0,
        tijdWacht:sr.tijdWacht||0,
        rating:0,opgeslagen:false,datum,
      };
      S.resultaten=[recept];
      return;
    }

    // Geen JSON-LD: stuur tekst naar Claude
    if(!pd.text||pd.text.length<100)throw new Error('Pagina bevat te weinig tekst');
    const parsed=await callAPI([{role:'user',content:`Haal het recept uit deze tekst. Bron URL: ${q}\n\n${pd.text.slice(0,8000)}`}],false,2000,SYS_URL);
    if(pd.image&&parsed[0])parsed[0].afbeelding=pd.image;
    if(!Array.isArray(parsed)||!parsed.length)throw new Error('Geen recept gevonden');
    S.resultaten=normaliseer(parsed,q);
  }catch(e){
    S.fout=e.message;
    S.urlFoutGeblokkeerd=e.message.includes('blokkeert')||e.message.includes('verbinding')||e.message.includes('inloggen')||e.message.includes('betaal');
  }
  finally{S.laden=false;render();}
}

async function verwerkTekst(){
  const tekst=S.handmatigeTekst.trim();
  if(tekst.length<30){S.fout='Plak een recept of typ wat meer tekst';rIP();return;}
  S.laden=true;S.fout='';S.resultaten=[];render();
  try{
    const titelHint=S.handmatigeTitel.trim()?`De titel is: "${S.handmatigeTitel.trim()}". `:'';
    const bronHint=S.handmatigeUrl.trim()?`\nBron URL: ${S.handmatigeUrl.trim()}`:'';
    const content=`${titelHint}Haal het recept uit deze tekst.${bronHint}\n\n${tekst.slice(0,8000)}`;
    const parsed=await callAPI([{role:'user',content}],false,2000,SYS_URL);
    if(!Array.isArray(parsed)||!parsed.length)throw new Error('Geen recept gevonden');
    S.resultaten=normaliseer(parsed,S.handmatigeUrl.trim()||'');
    if(S.handmatigeTitel.trim()&&S.resultaten[0]&&!S.resultaten[0].titel)S.resultaten[0].titel=S.handmatigeTitel.trim();
  }catch(e){S.fout=e.message;}
  finally{S.laden=false;render();}
}

function bouwShop(){
  const sel=S.recepten.filter(r=>S.geselecteerd.includes(r.id));
  const map={};
  sel.forEach(r=>{
    const p=gP(r.id);
    (r.ingredienten||[]).forEach(ing=>{
      const k=ing.naam.toLowerCase().trim();
      const hv=parseFloat((ing.hoeveelheid*(p/(r.personen||4))).toFixed(1));
      const uk=map[k]&&map[k].eenheid!==ing.eenheid?k+'_'+ing.eenheid:k;
      if(map[uk]&&map[uk].eenheid===ing.eenheid)map[uk].hoeveelheid=parseFloat((map[uk].hoeveelheid+hv).toFixed(1));
      else map[uk]={naam:ing.naam,hoeveelheid:hv,eenheid:ing.eenheid,done:false,afd:getAfd(ing.naam),extra:false};
    });
  });
  const items=Object.values(map);
  items.forEach(ni=>{const o=S.shopItems.find(x=>x.naam.toLowerCase()===ni.naam.toLowerCase()&&x.eenheid===ni.eenheid&&!x.extra);if(o)ni.done=o.done;});
  S.shopItems=[...items,...S.extraItems.map(e=>({...e,afd:e.afd||getAfd(e.naam)}))];
}
async function verbeterBoodschappen(){
  const recepItems=S.shopItems.filter(i=>!i.extra);
  if(!recepItems.length)return;
  try{
    const input=recepItems.map(i=>({hoeveelheid:i.hoeveelheid,eenheid:i.eenheid||'',naam:i.naam}));
    const result=await callAPI([{role:'user',content:`Reformuleer deze ingrediënten voor een boodschappenlijst:\n${JSON.stringify(input)}`}],false,800,SYS_SHOP);
    if(Array.isArray(result)&&result.length===recepItems.length){
      recepItems.forEach((item,i)=>{
        if(typeof result[i]==='string'&&result[i].trim())item.naam=result[i].trim();
      });
    }
  }catch(e){console.warn('Reformuleren mislukt, gebruik ruwe hoeveelheden:',e.message);}
}
async function maakBoodschappenlijst(){
  bouwShop();setTab('boodschappen');render();
  await verbeterBoodschappen();
  if(S.gebruiker&&S.menuId)await slaBoodschappenlijstOp();
  else render();
}
async function slaBoodschappenlijstOp(){
  const{data:bestaand}=await DB.from('shopping_lists').select('id').eq('user_id',S.gebruiker.id).eq('menu_id',S.menuId).maybeSingle();
  let lijstId;
  if(bestaand){
    lijstId=bestaand.id;
    await DB.from('shopping_items').delete().eq('list_id',lijstId);
  }else{
    const{data:nieuw,error}=await DB.from('shopping_lists').insert({user_id:S.gebruiker.id,menu_id:S.menuId}).select('id').single();
    if(error){console.error(error.message);return;}
    lijstId=nieuw.id;
  }
  S.lijstId=lijstId;
  if(S.shopItems.length>0){
    await DB.from('shopping_items').insert(S.shopItems.map((item,i)=>({
      list_id:lijstId,name:item.naam,
      amount:`${item.hoeveelheid}${item.eenheid?' '+item.eenheid:''}`,
      department:item.afd||'Overig',is_checked:item.done||false,
      sort_order:item.extra?1000+i:i,
    })));
  }
  await herlaadBoodschappen(lijstId);
  abonneer(lijstId);
}
async function herlaadBoodschappen(lijstId){
  const{data}=await DB.from('shopping_items').select('*').eq('list_id',lijstId).order('sort_order');
  if(!data)return;
  S.shopItems=data.map(i=>{
    const m=(i.amount||'').match(/^([\d.]+)\s*(.*)$/);
    return{naam:i.name,hoeveelheid:m?parseFloat(m[1]):1,eenheid:m?(m[2]||'').trim():'',done:i.is_checked,extra:i.sort_order>=1000,afd:i.department||'Overig',sbId:i.id};
  });
  S.extraItems=S.shopItems.filter(i=>i.extra);
  rIP();
}
async function laadBoodschappen(){
  if(!S.gebruiker||!S.menuId)return;
  const{data:list}=await DB.from('shopping_lists').select('id').eq('user_id',S.gebruiker.id).eq('menu_id',S.menuId).maybeSingle();
  if(!list)return;
  S.lijstId=list.id;
  await herlaadBoodschappen(list.id);
  abonneer(list.id);
}
async function ensureLijstId(){
  if(S.lijstId)return S.lijstId;
  if(!S.gebruiker)return null;
  if(!S.menuId){
    const{data:bestaand}=await DB.from('week_menus').select('id').eq('user_id',S.gebruiker.id).eq('week_start',S.actieveWeek).maybeSingle();
    if(bestaand)S.menuId=bestaand.id;
    else{
      const{data:nieuw}=await DB.from('week_menus').insert({user_id:S.gebruiker.id,week_start:S.actieveWeek}).select('id').single();
      if(nieuw)S.menuId=nieuw.id;
    }
  }
  if(!S.menuId)return null;
  const{data:bestaand}=await DB.from('shopping_lists').select('id').eq('user_id',S.gebruiker.id).eq('menu_id',S.menuId).maybeSingle();
  if(bestaand){S.lijstId=bestaand.id;abonneer(bestaand.id);return S.lijstId;}
  const{data:nieuw}=await DB.from('shopping_lists').insert({user_id:S.gebruiker.id,menu_id:S.menuId}).select('id').single();
  if(nieuw){S.lijstId=nieuw.id;abonneer(nieuw.id);}
  return S.lijstId||null;
}
async function bewaarVoorVolgendeWeek(){
  const items=S.extraItems.filter(i=>!i.done);
  if(!items.length){alert('Geen handmatige items om te bewaren.');return;}
  if(!S.gebruiker)return;
  const aw=new Date((S.actieveWeek||getMaandag())+'T00:00:00');
  aw.setDate(aw.getDate()+7);
  const vMaandag=aw.toISOString().split('T')[0];
  let menuId;
  const{data:em}=await DB.from('week_menus').select('id').eq('user_id',S.gebruiker.id).eq('week_start',vMaandag).maybeSingle();
  if(em)menuId=em.id;
  else{
    const{data:nm}=await DB.from('week_menus').insert({user_id:S.gebruiker.id,week_start:vMaandag}).select('id').single();
    menuId=nm?.id;
  }
  if(!menuId)return;
  let lijstId;
  const{data:el}=await DB.from('shopping_lists').select('id').eq('user_id',S.gebruiker.id).eq('menu_id',menuId).maybeSingle();
  if(el)lijstId=el.id;
  else{
    const{data:nl}=await DB.from('shopping_lists').insert({user_id:S.gebruiker.id,menu_id:menuId}).select('id').single();
    lijstId=nl?.id;
  }
  if(!lijstId)return;
  await DB.from('shopping_items').insert(
    items.map((item,i)=>({list_id:lijstId,name:item.naam,amount:`${item.hoeveelheid}${item.eenheid?' '+item.eenheid:''}`,department:item.afd||'Overig',is_checked:false,sort_order:1000+i}))
  );
  alert(`${items.length} item${items.length===1?'':'s'} bewaard voor de week van ${formatMaandag(vMaandag)}.`);
}
let realtimeSub=null;
function abonneer(lijstId){
  if(realtimeSub){DB.removeChannel(realtimeSub);realtimeSub=null;}
  realtimeSub=DB.channel('lijst-'+lijstId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'shopping_items',filter:`list_id=eq.${lijstId}`},
      payload=>{const item=S.shopItems.find(i=>i.sbId===payload.new.id);if(item){item.done=payload.new.is_checked;rIP();}}
    ).subscribe();
}
function toggleShop(idx){
  if(S.shopItems[idx]===undefined)return;
  S.shopItems[idx].done=!S.shopItems[idx].done;
  const sbId=S.shopItems[idx].sbId;
  if(sbId)DB.from('shopping_items').update({is_checked:S.shopItems[idx].done}).eq('id',sbId).then(({error})=>{if(error)console.error(error.message);});
  rIP();
}
function delShop(idx){
  const item=S.shopItems[idx];
  if(item?.sbId)DB.from('shopping_items').delete().eq('id',item.sbId).then(({error})=>{if(error)console.error(error.message);});
  S.shopItems.splice(idx,1);
  if(item?.extra)S.extraItems=S.extraItems.filter(e=>e!==item);
  rIP();
}
async function addExtra(){
  const n=document.getElementById('en')?.value?.trim();if(!n)return;
  const hv=parseFloat(document.getElementById('ehv')?.value)||1;
  const een=document.getElementById('eee')?.value?.trim()||'st';
  const item={naam:n,hoeveelheid:hv,eenheid:een,done:false,extra:true,afd:getAfd(n)};
  S.extraItems.push(item);S.shopItems.push(item);
  document.getElementById('en').value='';document.getElementById('ehv').value='';document.getElementById('eee').value='';
  rIP();
  if(S.gebruiker){
    const lijstId=await ensureLijstId();
    if(lijstId){
      const{data,error}=await DB.from('shopping_items').insert({
        list_id:lijstId,name:n,amount:`${hv}${een?' '+een:''}`,
        department:item.afd,is_checked:false,sort_order:1000+S.extraItems.length,
      }).select('id').single();
      if(!error&&data)item.sbId=data.id;
    }
  }
}

  let s='<div class="rcard-labels">';

  parseCats(r.categorie).forEach(c=>{const cls=c==='Niet nog een keer'?'lbl-n':'lbl-c';s+=`<span class="lbl ${cls}">${h(c)}</span>`;});
  (r.tags||[]).forEach(t=>s+=`<span class="lbl lbl-t">${h(t)}</span>`);
  return s+'</div>';
}
function buildStars(rating,id){return'<div class="stars">'+[1,2,3,4,5].map(n=>`<span class="star${n<=rating?' on':''}" onclick="setRating('${id}',${n})">★</span>`).join('')+'</div>';}

          <div class="afd-line"></div>

        ${g.items.map(item=>`
          <div class="sitem" style="background:${g.k}">
            <div class="scb" onclick="toggleShop(${item.idx})">${item.done?'✓':''}</div>

async function opslaanNaam(){
  const naam=document.getElementById('p-naam')?.value?.trim();
  if(!naam||!S.gebruiker)return;
  const{error}=await DB.from('profiles').update({display_name:naam}).eq('id',S.gebruiker.id);
  if(!error){S.profiel={...S.profiel,display_name:naam};rIP();}
  else alert('Kon naam niet opslaan: '+error.message);
}
async function opslaanBio(){
  if(!S.gebruiker)return;
  const bio=document.getElementById('p-bio')?.value?.trim()||'';
  const{error}=await DB.from('profiles').update({bio}).eq('id',S.gebruiker.id);
  if(!error){S.profiel={...S.profiel,bio};rIP();}
  else alert('Kon bio niet opslaan: '+error.message);
}
async function wijzigWachtwoord(){
  const ww1=document.getElementById('p-ww1')?.value||'';
  const ww2=document.getElementById('p-ww2')?.value||'';
  const foutEl=document.getElementById('p-fout');
  const toonFout=t=>{foutEl.textContent=t;foutEl.style.display='';};
  if(ww1!==ww2)return toonFout('Wachtwoorden komen niet overeen');
  if(ww1.length<6)return toonFout('Wachtwoord moet minimaal 6 tekens zijn');
  foutEl.style.display='none';
  const{error}=await DB.auth.updateUser({password:ww1});
  if(error)toonFout(error.message);
  else{document.getElementById('p-ww1').value='';document.getElementById('p-ww2').value='';alert('Wachtwoord gewijzigd!');}
}

function toggleWW(btn){
  const inp=btn.previousElementSibling;
  const toon=inp.type==='password';
  inp.type=toon?'text':'password';
  const svg=btn.querySelector('svg');
  if(toon){
    svg.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    svg.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
async function registreer(){
  const naam=document.getElementById('reg-naam')?.value?.trim();
  const email=document.getElementById('reg-email')?.value?.trim();
  const ww=document.getElementById('reg-ww')?.value;
  if(!naam){S.authFout='Vul je naam in';rIP();return;}
  if(!email){S.authFout='Vul je e-mailadres in';rIP();return;}
  if(!ww||ww.length<6){S.authFout='Wachtwoord moet minimaal 6 tekens zijn';rIP();return;}
  S.authLaden=true;S.authFout='';rIP();
  try{
    const{data,error}=await DB.auth.signUp({email,password:ww});
    if(error)throw error;
    const username=naam.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').slice(0,20)+'-'+Date.now().toString(36);
    const{error:pe}=await DB.from('profiles').insert({id:data.user.id,username,display_name:naam});
    if(pe)throw pe;
    S.gebruiker=data.user;S.profiel={display_name:naam};
    await lod();S.scherm='app';render();
    await verwerkPendingVolg();
    startOnboarding();
  }catch(e){S.authFout=e.message||'Er ging iets mis';}
  finally{S.authLaden=false;render();}
}

async function login(){
  const email=document.getElementById('log-email')?.value?.trim();
  const ww=document.getElementById('log-ww')?.value;
  if(!email||!ww){S.authFout='Vul e-mail en wachtwoord in';rIP();return;}
  S.authLaden=true;S.authFout='';rIP();
  try{
    const{data,error}=await DB.auth.signInWithPassword({email,password:ww});
    if(error)throw error;
    S.gebruiker=data.user;
    const{data:p}=await DB.from('profiles').select('display_name,bio').eq('id',data.user.id).single();
    S.profiel=p||{display_name:email};
    await lod();S.scherm='app';render();
    await verwerkPendingVolg();
  }catch(e){S.authFout=e.message==='Invalid login credentials'?'E-mail of wachtwoord klopt niet':e.message||'Er ging iets mis';}
  finally{S.authLaden=false;render();}
}

async function uitloggen(){
  await DB.auth.signOut();
  Object.assign(S,{gebruiker:null,profiel:null,recepten:[],geselecteerd:[],weekPers:{},shopItems:[],extraItems:[],resultaten:[],scherm:'login',authTab:'login',authFout:''});
  render();
}

function stapOnboarding(delta){
  const nieuw=S.onboardingStap+delta;
  if(nieuw<0||nieuw>=OB_STAPPEN.length)return;
  S.onboardingRichting=delta>0?'fwd':'back';
  S.onboardingStap=nieuw;
  renderOnboardingOverlay();
}

function sluitOnboarding(naarOntdekken=false){
  document.getElementById('ob-ovl')?.remove();
  S.onboarding=false;
  if(naarOntdekken){S.tab='zoeken';render();}
}

function renderOnboardingOverlay(){
  const stap=OB_STAPPEN[S.onboardingStap];
  const totaal=OB_STAPPEN.length;
  const isLaatste=S.onboardingStap===totaal-1;
  const isEerste=S.onboardingStap===0;
  const richting=S.onboardingRichting;

  const dots=OB_STAPPEN.map((_,i)=>`<div class="ob-dot${i===S.onboardingStap?' on':''}"></div>`).join('');

  const html=`
    <div id="ob-ovl" onclick="if(event.target===this)sluitOnboarding()">
      <div class="ob-kaart">
        <div class="ob-illu" style="background:${stap.kleur}">
          <div class="${richting==='fwd'?'ob-fwd':'ob-back'}" style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%">
            ${stap.illu}
          </div>
        </div>
        <div class="ob-body">
          <div class="${richting==='fwd'?'ob-fwd':'ob-back'}">
            ${stap.tab?`<div class="ob-stap-label">Tab: ${stap.tab}</div>`:`<div class="ob-stap-label">Stap ${S.onboardingStap+1} van ${totaal}</div>`}
            <div class="ob-titel">${stap.titel}</div>
            <div class="ob-tekst">${stap.tekst}</div>
          </div>
          <div class="ob-dots">${dots}</div>
          <div class="ob-nav">
            ${!isEerste?`<button class="btn btn-ghost" onclick="stapOnboarding(-1)" style="flex:1">← Vorige</button>`:`<button class="btn btn-ghost" onclick="sluitOnboarding()" style="flex:1">Overslaan</button>`}
            ${isLaatste
              ?`<button class="btn btn-accent" onclick="sluitOnboarding(true)" style="flex:2">Ga naar Ontdekken →</button>`
              :`<button class="btn btn-accent" onclick="stapOnboarding(1)" style="flex:2">${isEerste?'Rondleiding starten →':'Volgende →'}</button>`}
          </div>
        </div>
      </div>
    </div>`;

  const bestaand=document.getElementById('ob-ovl');
  if(bestaand){bestaand.outerHTML=html;}
  else{document.body.insertAdjacentHTML('beforeend',html);}
}

function startOnboarding(){
  S.onboarding=true;S.onboardingStap=0;S.onboardingRichting='fwd';
  renderOnboardingOverlay();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const hdr=document.getElementById('hdr');
  if(S.scherm!=='app'){
    hdr.style.display='none';
    document.getElementById('content').innerHTML=renderAuth();
    return;
  }
  hdr.style.display='';
  const naam=S.profiel?.display_name||S.gebruiker?.email||'';
  document.getElementById('hdr-sub').innerHTML=`${h(naam)} &middot; ${S.recepten.length} recepten`;
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',['recepten','zoeken','weekmenu','boodschappen','vrienden','profiel'][i]===S.tab));
  let html='';
  if(S.tab==='recepten')html=renderRecepten();
  else if(S.tab==='zoeken')html=renderZoeken();
  else if(S.tab==='weekmenu')html=renderWeekmenu();
  else if(S.tab==='boodschappen')html=renderBoodschappen();
  else if(S.tab==='vrienden')html=renderVrienden();
  else if(S.tab==='profiel')html=renderProfiel();
  document.getElementById('content').innerHTML=html;
}
async function importeerLink(url){
  S.zoekUrl=url;S.laden=true;S.fout='';S.resultaten=[];S.ontdekTab='url';render();
  try{
    const pr=await fetch('/fetch?url='+encodeURIComponent(url));
    if(!pr.ok){const e=await pr.json().catch(()=>({}));throw new Error(e?.error||'Kon pagina niet ophalen');}
    const pd=await pr.json();
    if(pd.schema_recept){
      const sr=pd.schema_recept;
      const datum=new Date().toISOString().split('T')[0];
      S.resultaten=[{
        id:'r'+Date.now()+Math.random().toString(36).slice(2),
        titel:sr.titel||'Recept',omschrijving:sr.omschrijving||'',
        personen:sr.personen||4,ingredienten:sr.ingredienten||[],stappen:sr.stappen||[],
        keuken:sr.keuken||'',categorie:'',tags:[],notities:'',bron:url,
        afbeelding:sr.afbeelding||pd.image||'',rating:0,opgeslagen:false,datum,
      }];
      return;
    }
    if(!pd.text||pd.text.length<100)throw new Error('Pagina bevat te weinig tekst');
    const parsed=await callAPI([{role:'user',content:`Haal het recept uit deze tekst. Bron URL: ${url}\n\n${pd.text.slice(0,8000)}`}],false,2000,SYS_URL);
    if(pd.image&&parsed[0])parsed[0].afbeelding=pd.image;
    if(!Array.isArray(parsed)||!parsed.length)throw new Error('Geen recept gevonden');
    S.resultaten=normaliseer(parsed,url);
  }catch(e){S.fout=e.message;}
  finally{S.laden=false;render();}
}
function rIP(){
  const y=window.scrollY;
  const fid=document.activeElement?.id;
  const ss=document.activeElement?.selectionStart;
  const se=document.activeElement?.selectionEnd;
  render();
  window.scrollTo(0,y);
  if(fid){const el=document.getElementById(fid);if(el){el.focus();try{if(ss!=null)el.setSelectionRange(ss,se);}catch(e){}}}
}
window.addEventListener('DOMContentLoaded',async()=>{
  const params=new URLSearchParams(window.location.search);
  if(params.get('volg'))pendingVolgId=params.get('volg');
  render();
  const{data:{session}}=await DB.auth.getSession();
  if(session){
    S.gebruiker=session.user;
    const{data:p}=await DB.from('profiles').select('display_name').eq('id',session.user.id).single();
    S.profiel=p||{display_name:session.user.email};
    await lod();S.scherm='app';
    await verwerkPendingVolg();
  }else{
    S.scherm='login';
    if(params.get('uitnodigen')||params.get('volg'))S.authTab='register';
  }
  render();
});
