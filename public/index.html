<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Restaurant 't Rijnsburgje</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f5f0;--surface:#fff;--surface2:#f2ede6;
  --border:#e8e0d5;--border2:#d4c9b8;
  --text:#1a1208;--text2:#6b5c45;--text3:#9c8a72;
  --accent:#b85c2a;--accent2:#d4763a;--accent-bg:#fdf3ec;
  --green:#2d6a4f;--green-bg:#eaf4ef;
  --blue:#2a4a8a;--blue-bg:#eef2fb;
  --red:#8a2a2a;--red-bg:#fceaea;
  --gold:#8a6a1a;--gold-bg:#fdf6e3;
  --radius:10px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 4px 20px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
a{color:var(--accent);text-decoration:none}

/* ── Header ── */
#hdr{background:var(--text);padding:14px 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#hdr-inner{max-width:800px;margin:0 auto}
#hdr h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#f5e6c8;letter-spacing:-.02em}
#hdr h1 span{font-weight:400;font-style:italic}
#hdr-sub{font-size:11px;color:#9c8060;margin:2px 0 12px}
#tabs{display:flex;gap:2px}
.tb{padding:8px 14px;background:transparent;color:#9c8060;border:none;font-size:12px;font-weight:500;border-radius:8px 8px 0 0;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.tb.on{background:var(--bg);color:var(--text);font-weight:600}

/* ── Content ── */
#content{max-width:800px;margin:0 auto;padding:20px 16px 80px}

/* ── Recipe card — Pinterest style ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);transition:all .2s;position:relative;cursor:pointer}
.rcard:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.rcard.sel{border:2px solid var(--accent);box-shadow:0 4px 20px rgba(184,92,42,.2)}
.rcard-img{height:140px;background:linear-gradient(135deg,var(--surface2) 0%,var(--border) 100%);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.rcard-img-emoji{font-size:52px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.sel-badge{position:absolute;top:10px;right:10px;background:var(--accent);color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.rcard-body{padding:14px 16px 10px}
.rcard-labels{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.lbl{border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;letter-spacing:.03em;display:inline-flex;align-items:center;gap:3px}
.lbl-k{background:var(--gold-bg);color:var(--gold);border:1px solid #e8d890}
.lbl-c{background:var(--blue-bg);color:var(--blue);border:1px solid #c0cef0}
.lbl-n{background:var(--red-bg);color:var(--red);border:1px solid #f0c0c0}
.lbl-t{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.rcard-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px}
.rcard-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.rcard-note{background:var(--gold-bg);border-left:3px solid var(--gold);padding:5px 8px;font-size:11px;color:var(--gold);margin-bottom:10px;border-radius:0 6px 6px 0;font-style:italic}
.rcard-meta{display:flex;justify-content:space-between;align-items:center}
.stars{display:flex;gap:1px}
.star{font-size:14px;color:#ddd0b8;cursor:pointer;transition:color .1s;line-height:1}
.star.on{color:var(--accent2)}
.rcard-pers{font-size:11px;color:var(--text3)}
.rcard-divider{height:1px;background:var(--border);margin:0 16px}
.rcard-expand{padding:8px 16px;font-size:11px;color:var(--text2);font-weight:500;display:flex;justify-content:space-between;cursor:pointer;user-select:none;letter-spacing:.02em}
.rcard-expand:hover{background:var(--surface2)}
.rcard-detail{padding:12px 16px;background:var(--bg);display:none;border-top:1px solid var(--border)}
.rcard-detail.open{display:block}
.rcard-detail h4{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px}
.rcard-detail ul,.rcard-detail ol{padding:0 0 0 16px;margin:0 0 12px}
.rcard-detail li{font-size:12px;color:var(--text);margin-bottom:4px;line-height:1.5}
.rcard-actions{padding:10px 16px 14px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border)}

/* ── Buttons ── */
.btn{border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;transition:all .15s;cursor:pointer;letter-spacing:.01em;display:inline-flex;align-items:center;gap:5px;justify-content:center}
.btn-dark{background:var(--text);color:#f5e6c8}
.btn-dark:hover{background:#2d2010}
.btn-accent{background:var(--accent);color:white}
.btn-accent:hover{background:var(--accent2)}
.btn-saved{background:var(--green-bg);color:var(--green)}
.btn-light{background:var(--surface2);color:var(--text2)}
.btn-light:hover{background:var(--border)}
.btn-ghost{background:none;color:var(--text3);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid #f0c0c0}
.btn-w{width:100%;padding:12px 0;font-size:13px;border-radius:var(--radius)}
.btn-w2{width:100%;padding:11px 0;font-size:13px;border-radius:var(--radius);margin-top:8px}

/* ── Inputs ── */
.inp{padding:10px 13px;border-radius:var(--radius);border:1.5px solid var(--border);font-size:13px;color:var(--text);outline:none;background:var(--surface);width:100%;transition:border .15s}
.inp:focus{border-color:var(--accent)}
textarea.inp{resize:vertical}

/* ── Filter bar ── */
.filter-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
.filter-wrap h3{font-family:'Playfair Display',serif;font-size:13px;color:var(--text);margin-bottom:9px;font-weight:700}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fb{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.on{background:var(--accent);color:white;border-color:var(--accent)}
.fb.nnek{background:var(--red-bg);color:var(--red);border-color:#f0c0c0}
.fb.nnek.on{background:var(--red);color:white}

/* ── Search box ── */
.search-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.search-wrap h2{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:14px;color:var(--text)}
.mode-row{display:flex;gap:6px;margin-bottom:13px;background:var(--surface2);border-radius:var(--radius);padding:3px}
.mb{flex:1;padding:7px 0;border-radius:7px;background:transparent;color:var(--text2);border:none;font-size:12px;font-weight:500;transition:all .15s}
.mb.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.search-hint{font-size:11px;color:var(--text3);margin-top:5px;font-style:italic}

/* ── Week menu stepper ── */
.stepper{display:inline-flex;align-items:center;gap:1px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stepper button{background:none;border:none;font-size:15px;color:var(--accent);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:background .15s}
.stepper button:hover{background:var(--border)}
.stepper span{font-size:13px;color:var(--text);min-width:28px;text-align:center;font-weight:600}

/* ── Shopping list ── */
.afd-header{display:flex;align-items:center;gap:8px;margin:16px 0 6px}
.afd-title{font-weight:600;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.afd-line{flex:1;height:1px;background:var(--border)}
.afd-count{font-size:11px;color:var(--text3)}
.sitem{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:4px;transition:all .15s;background:var(--surface)}
.sitem:hover{border-color:var(--border2)}
.sitem.done{opacity:.55}
.scb{width:19px;height:19px;border-radius:5px;flex-shrink:0;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;font-size:11px;color:white}
.scb.done{border-color:var(--accent);background:var(--accent)}
.sname{flex:1;font-size:13px;color:var(--text);cursor:pointer;line-height:1.3}
.sname.done{text-decoration:line-through;color:var(--text3)}
.sqty{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap}
.sdel{background:none;border:none;color:var(--border2);font-size:13px;padding:0 2px;cursor:pointer;transition:color .15s;flex-shrink:0}
.sdel:hover{color:var(--red)}
.done-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:16px}
.done-section h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px;cursor:pointer}
.done-items{display:flex;flex-direction:column;gap:3px}

/* ── Misc ── */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.box-info{background:var(--accent-bg);border:1px solid #f0c8a0;border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#7a3a0e}
.box-err{background:var(--red-bg);border:1px solid #f0c0c0;border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--red)}
.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:14px}
.empty span{font-size:36px;display:block;margin-bottom:10px}
.hint{text-align:center;padding:30px 20px;color:var(--text3);font-size:13px;font-style:italic}
.sec-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:7px}
.prog-bar{display:flex;gap:6px;margin-bottom:14px}
.prog-seg{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background .3s}
.prog-seg.done{background:var(--accent)}
.divider{height:1px;background:var(--border);margin:14px 0}

/* Modal */
#mov{position:fixed;inset:0;background:rgba(10,8,4,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
#mov.open{display:flex}
#mbox{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:22px 20px 36px;width:100%;max-width:800px;box-shadow:var(--shadow-lg);max-height:88vh;overflow-y:auto}
.cat-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;margin:0 5px 6px 0;cursor:pointer;transition:all .15s}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.ak{background:var(--gold-bg);color:var(--gold);border-color:#e8d890}
.cat-btn.ac{background:var(--blue-bg);color:var(--blue);border-color:#c0cef0}

@media(max-width:540px){
  .cards-grid{grid-template-columns:1fr}
  #hdr h1{font-size:17px}
  .tb{padding:7px 10px;font-size:11px}
}
</style>
</head>

// ── API — robust JSON extraction ──────────────────────────────────────────────
function extractJSON(txt){
  // Try to find JSON array, handle markdown fences and extra text
  let clean=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
  // Find outermost array
  let depth=0,start=-1,end=-1;
  for(let i=0;i<clean.length;i++){
    if(clean[i]==='['){if(start===-1)start=i;depth++;}
    else if(clean[i]===']'){depth--;if(depth===0){end=i;break;}}
  }
  if(start===-1||end===-1)throw new Error('Geen JSON array gevonden in antwoord');
  const slice=clean.slice(start,end+1);
  try{return JSON.parse(slice);}
  catch(e){
    // Try to fix common issues: unescaped quotes, trailing commas
    const fixed=slice.replace(/,\s*([}\]])/g,'$1').replace(/(['"])?([a-zA-Z0-9_]+)(['"])?:/g,'"$2":');
    return JSON.parse(fixed);
  }
}

async function callAPI(messages,search=false,maxTokens=1200,sysOverride=null){
  const sys=(sysOverride||SYS).replace('DATUM',new Date().toISOString().split('T')[0]);
  const body={model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system:sys,messages};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const resp=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok)throw new Error('API fout: '+resp.status);
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||'API fout');
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!txt)throw new Error('Geen antwoord ontvangen');
  return extractJSON(txt);
}

function bouwShop(){
  const sel=S.recepten.filter(r=>S.geselecteerd.includes(r.id));
  const map={};
  sel.forEach(r=>{
    const p=gP(r.id);
    (r.ingredienten||[]).forEach(ing=>{
      const k=ing.naam.toLowerCase().trim();
      const hv=parseFloat((ing.hoeveelheid*(p/(r.personen||4))).toFixed(1));
      const uk=map[k]&&map[k].eenheid!==ing.eenheid?k+'_'+ing.eenheid:k;
      if(map[uk]&&map[uk].eenheid===ing.eenheid)map[uk].hoeveelheid=parseFloat((map[uk].hoeveelheid+hv).toFixed(1));
      else map[uk]={naam:ing.naam,hoeveelheid:hv,eenheid:ing.eenheid,done:false,afd:getAfd(ing.naam),extra:false};
    });
  });
  const items=Object.values(map);
  items.forEach(ni=>{const o=S.shopItems.find(x=>x.naam.toLowerCase()===ni.naam.toLowerCase()&&x.eenheid===ni.eenheid&&!x.extra);if(o)ni.done=o.done;});
  S.shopItems=[...items,...S.extraItems.map(e=>({...e,afd:e.afd||getAfd(e.naam)}))];
}

  if(item?.sbId)DB.from('shopping_items').delete().eq('id',item.sbId).then(({error})=>{if(error)console.error(error.message);});
  S.shopItems.splice(idx,1);
  if(item?.extra)S.extraItems=S.extraItems.filter(e=>e!==item);
  rIP();
}
async function addExtra(){
  const n=document.getElementById('en')?.value?.trim();if(!n)return;
  const hv=parseFloat(document.getElementById('ehv')?.value)||1;
  const een=document.getElementById('eee')?.value?.trim()||'st';
  const item={naam:n,hoeveelheid:hv,eenheid:een,done:false,extra:true,afd:getAfd(n)};
  S.extraItems.push(item);S.shopItems.push(item);
  document.getElementById('en').value='';document.getElementById('ehv').value='';document.getElementById('eee').value='';
  rIP();
  if(S.gebruiker){
    const lijstId=await ensureLijstId();
    if(lijstId){
      const{data,error}=await DB.from('shopping_items').insert({
        list_id:lijstId,name:n,amount:`${hv}${een?' '+een:''}`,
        department:item.afd,is_checked:false,sort_order:1000+S.extraItems.length,
      }).select('id').single();
      if(!error&&data)item.sbId=data.id;
    }
  }
}

function buildLabels(r){
  let s='<div class="rcard-labels">';
  if(r.keuken)s+=`<span class="lbl lbl-k">${h(r.keuken)}</span>`;
  if(r.categorie){const c=r.categorie==='Niet nog een keer'?'lbl-n':'lbl-c';s+=`<span class="lbl ${c}">${h(r.categorie)}</span>`;}
  (r.tags||[]).forEach(t=>s+=`<span class="lbl lbl-t">${h(t)}</span>`);
  return s+'</div>';
}
function buildStars(rating,id){return'<div class="stars">'+[1,2,3,4,5].map(n=>`<span class="star${n<=rating?' on':''}" onclick="setRating('${id}',${n})">★</span>`).join('')+'</div>';}
function buildCard(r,opts={}){
  const{op,idx,showSel,showEdit,showDel,stepper,pers}=opts;
  const sel=S.geselecteerd.includes(r.id);
  const p=pers||r.personen||4;
  const ings=(r.ingredienten||[]).map(i=>`<li><strong>${sc(i.hoeveelheid,r.personen||4,p)} ${h(i.eenheid)}</strong> ${h(i.naam)}</li>`).join('');
  const stps=(r.stappen||[]).map(s=>`<li>${h(s)}</li>`).join('');
  const cid='c'+r.id.replace(/[^a-z0-9]/gi,'-');
  return`<div class="rcard${sel?' sel':''}" id="${cid}">
    ${sel?'<div class="sel-badge">✓</div>':''}
    <div class="rcard-img">${r.afbeelding
      ?`<img src="${h(r.afbeelding)}" alt="${h(r.titel)}" style="width:100%;height:100%;object-fit:${r.afbeelding.startsWith('blob:')?'contain':'cover'};background:var(--surface2)" onerror="this.parentElement.innerHTML='<span class=rcard-img-emoji>${getEmoji(r)}</span>'">`
      :`<span class="rcard-img-emoji">${getEmoji(r)}</span>`}</div>
    <div class="rcard-body">
      ${buildLabels(r)}
      <div class="rcard-title">${h(r.titel)}</div>
      <div class="rcard-desc">${h(r.omschrijving)}</div>
      ${r.notities?`<div class="rcard-note">📝 ${h(r.notities)}</div>`:''}
      <div class="rcard-meta">
        ${buildStars(r.rating||0,r.id)}
        ${stepper
          ?`<div class="stepper"><button onclick="sP('${r.id}',${p-1})">−</button><span>${p}</span><button onclick="sP('${r.id}',${p+1})">+</button></div>`
          :`<span class="rcard-pers">🍽 ${p} personen</span>`}
      </div>
    </div>
    <div class="rcard-divider"></div>
    <div class="rcard-expand" onclick="tD('${cid}')"><span>Recept bekijken</span><span class="arr">▼</span></div>
    <div class="rcard-detail" id="d${cid}">
      <h4>Ingrediënten${stepper?' — '+p+' personen':''}</h4><ul>${ings}</ul>
      <h4>Bereiding</h4><ol>${stps}</ol>
      ${r.bron?`<a href="${h(r.bron)}" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent)">Origineel recept →</a>`:''}
    </div>
    <div class="rcard-actions">
      ${op?`<button class="btn ${r.opgeslagen?'btn-saved':'btn-accent'}" onclick="saveRes(${idx})">${r.opgeslagen?'✓ Opgeslagen':'Opslaan'}</button>`:''}
      ${showEdit?`<button class="btn btn-light" onclick="openEdit('${r.id}')">✏️ Label</button>`:''}
      ${showSel?`<button class="btn ${sel?'btn-ghost':'btn-dark'}" onclick="toggleSel('${r.id}')">${sel?'Deselecteer':'Kies voor week'}</button>`:''}
      ${showDel?`<button class="btn btn-ghost" onclick="delRec('${r.id}')">🗑</button>`:''}
    </div>
  </div>`;
}

      <span class="sec-label">Wachtwoord</span>
      <input id="${S.authTab==='login'?'log':'reg'}-ww" class="inp" style="margin-bottom:20px" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')${S.authTab==='login'?'login()':'registreer()'}">
      ${S.authFout?`<div class="box-err" style="margin-bottom:16px">⚠️ ${h(S.authFout)}</div>`:''}
      <button class="btn btn-accent btn-w" onclick="${S.authTab==='login'?'login()':'registreer()'}" ${S.authLaden?'disabled':''}>

async function registreer(){
  const naam=document.getElementById('reg-naam')?.value?.trim();
  const email=document.getElementById('reg-email')?.value?.trim();
  const ww=document.getElementById('reg-ww')?.value;
  if(!naam){S.authFout='Vul je naam in';rIP();return;}
  if(!email){S.authFout='Vul je e-mailadres in';rIP();return;}
  if(!ww||ww.length<6){S.authFout='Wachtwoord moet minimaal 6 tekens zijn';rIP();return;}
  S.authLaden=true;S.authFout='';rIP();
  try{
    const{data,error}=await DB.auth.signUp({email,password:ww});
    if(error)throw error;
    const username=naam.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').slice(0,20)+'-'+Date.now().toString(36);
    const{error:pe}=await DB.from('profiles').insert({id:data.user.id,username,display_name:naam});
    if(pe)throw pe;
    S.gebruiker=data.user;S.profiel={display_name:naam};
    await lod();S.scherm='app';
  }catch(e){S.authFout=e.message||'Er ging iets mis';}
  finally{S.authLaden=false;render();}
}

async function login(){
  const email=document.getElementById('log-email')?.value?.trim();
  const ww=document.getElementById('log-ww')?.value;
  if(!email||!ww){S.authFout='Vul e-mail en wachtwoord in';rIP();return;}
  S.authLaden=true;S.authFout='';rIP();
  try{
    const{data,error}=await DB.auth.signInWithPassword({email,password:ww});
    if(error)throw error;
    S.gebruiker=data.user;
    const{data:p}=await DB.from('profiles').select('display_name').eq('id',data.user.id).single();
    S.profiel=p||{display_name:email};
    await lod();S.scherm='app';
  }catch(e){S.authFout=e.message==='Invalid login credentials'?'E-mail of wachtwoord klopt niet':e.message||'Er ging iets mis';}
  finally{S.authLaden=false;render();}
}

async function uitloggen(){
  await DB.auth.signOut();
  Object.assign(S,{gebruiker:null,profiel:null,recepten:[],geselecteerd:[],weekPers:{},shopItems:[],extraItems:[],resultaten:[],scherm:'login',authTab:'login',authFout:''});
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const hdr=document.getElementById('hdr');
  if(S.scherm!=='app'){
    hdr.style.display='none';
    document.getElementById('content').innerHTML=renderAuth();
    return;
  }
  hdr.style.display='';
  const naam=S.profiel?.display_name||S.gebruiker?.email||'';
  document.getElementById('hdr-sub').innerHTML=`${h(naam)} &middot; ${S.recepten.length} recepten <a href="#" onclick="uitloggen();return false" style="color:var(--text3);font-size:10px;margin-left:8px">uitloggen</a>`;
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',['recepten','zoeken','weekmenu','boodschappen'][i]===S.tab));
  let html='';
  if(S.tab==='recepten')html=renderRecepten();
  else if(S.tab==='zoeken')html=renderZoeken();
  else if(S.tab==='weekmenu')html=renderWeekmenu();
  else if(S.tab==='boodschappen')html=renderBoodschappen();
  document.getElementById('content').innerHTML=html;
}
function rIP(){const y=window.scrollY;render();window.scrollTo(0,y);}
window.addEventListener('DOMContentLoaded',async()=>{
  render();
  const{data:{session}}=await DB.auth.getSession();
  if(session){
    S.gebruiker=session.user;
    const{data:p}=await DB.from('profiles').select('display_name').eq('id',session.user.id).single();
    S.profiel=p||{display_name:session.user.email};
    await lod();S.scherm='app';
  }else{
    S.scherm='login';
  }
  render();
});
</script>
