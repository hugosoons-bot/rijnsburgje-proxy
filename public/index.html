<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Restaurant 't Rijnsburgje</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f5f0;--surface:#fff;--surface2:#f2ede6;
  --border:#e8e0d5;--border2:#d4c9b8;
  --text:#1a1208;--text2:#6b5c45;--text3:#9c8a72;
  --accent:#b85c2a;--accent2:#d4763a;--accent-bg:#fdf3ec;
  --green:#2d6a4f;--green-bg:#eaf4ef;
  --blue:#2a4a8a;--blue-bg:#eef2fb;
  --red:#8a2a2a;--red-bg:#fceaea;
  --gold:#8a6a1a;--gold-bg:#fdf6e3;
  --radius:10px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 4px 20px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
a{color:var(--accent);text-decoration:none}

/* ── Header ── */
#hdr{background:var(--text);padding:14px 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#hdr-inner{max-width:800px;margin:0 auto}
#hdr h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#f5e6c8;letter-spacing:-.02em}
#hdr h1 span{font-weight:400;font-style:italic}
#hdr-sub{font-size:11px;color:#9c8060;margin:2px 0 12px}
#tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}#tabs::-webkit-scrollbar{display:none}
.tb{padding:8px 14px;background:transparent;color:#9c8060;border:none;font-size:12px;font-weight:500;border-radius:8px 8px 0 0;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.tb.on{background:var(--bg);color:var(--text);font-weight:600}

/* ── Content ── */
#content{max-width:800px;margin:0 auto;padding:20px 16px 80px}

/* ── Recipe card — Pinterest style ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);transition:all .2s;position:relative;cursor:pointer}
.rcard:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.rcard.sel{border:2px solid var(--accent);box-shadow:0 4px 20px rgba(184,92,42,.2)}
.rcard-img{height:140px;background:linear-gradient(135deg,var(--surface2) 0%,var(--border) 100%);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.rcard-img-emoji{font-size:52px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.sel-badge{position:absolute;top:10px;right:10px;background:var(--accent);color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.tijd-sticker{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:#fff;font-size:11px;font-weight:600;padding:3px 7px;border-radius:20px;letter-spacing:.3px;pointer-events:none}
.week-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
.rcard-body{padding:14px 16px 10px}
.rcard-labels{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.lbl{border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;letter-spacing:.03em;display:inline-flex;align-items:center;gap:3px}
.lbl-k{background:var(--gold-bg);color:var(--gold);border:1px solid #e8d890}
.lbl-c{background:var(--blue-bg);color:var(--blue);border:1px solid #c0cef0}
.lbl-n{background:var(--red-bg);color:var(--red);border:1px solid #f0c0c0}
.lbl-t{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.rcard-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px}
.rcard-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.rcard-note{background:var(--gold-bg);border-left:3px solid var(--gold);padding:5px 8px;font-size:11px;color:var(--gold);margin-bottom:10px;border-radius:0 6px 6px 0;font-style:italic}
.rcard-meta{display:flex;justify-content:space-between;align-items:center}
.stars{display:flex;gap:1px}
.star{font-size:14px;color:#ddd0b8;cursor:pointer;transition:color .1s;line-height:1}
.star.on{color:var(--accent2)}
.rcard-pers{font-size:11px;color:var(--text3)}
.rcard-divider{height:1px;background:var(--border);margin:0 16px}
.rcard-expand{padding:8px 16px;font-size:11px;color:var(--text2);font-weight:500;display:flex;justify-content:space-between;cursor:pointer;user-select:none;letter-spacing:.02em}
.rcard-expand:hover{background:var(--surface2)}
.rcard-detail{padding:12px 16px;background:var(--bg);display:none;border-top:1px solid var(--border)}
.rcard-detail.open{display:block}
.rcard-detail h4{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px}
.rcard-detail ul,.rcard-detail ol{padding:0 0 0 16px;margin:0 0 12px}
.rcard-detail li{font-size:12px;color:var(--text);margin-bottom:4px;line-height:1.5}
.rcard-actions{padding:10px 16px 14px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border)}

/* ── Buttons ── */
.btn{border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;transition:all .15s;cursor:pointer;letter-spacing:.01em;display:inline-flex;align-items:center;gap:5px;justify-content:center}
.btn-dark{background:var(--text);color:#f5e6c8}
.btn-dark:hover{background:#2d2010}
.btn-accent{background:var(--accent);color:white}
.btn-accent:hover{background:var(--accent2)}
.btn-saved{background:var(--green-bg);color:var(--green)}
.btn-light{background:var(--surface2);color:var(--text2)}
.btn-light:hover{background:var(--border)}
.btn-ghost{background:none;color:var(--text3);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid #f0c0c0}
.btn-w{width:100%;padding:12px 0;font-size:13px;border-radius:var(--radius)}
.btn-w2{width:100%;padding:11px 0;font-size:13px;border-radius:var(--radius);margin-top:8px}

/* ── Inputs ── */
.inp{padding:10px 13px;border-radius:var(--radius);border:1.5px solid var(--border);font-size:13px;color:var(--text);outline:none;background:var(--surface);width:100%;transition:border .15s}
.inp:focus{border-color:var(--accent)}
textarea.inp{resize:vertical}

/* ── Filter bar ── */
.filter-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
.filter-wrap h3{font-family:'Playfair Display',serif;font-size:13px;color:var(--text);margin-bottom:9px;font-weight:700}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fb{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.on{background:var(--accent);color:white;border-color:var(--accent)}
.fb.nnek{background:var(--red-bg);color:var(--red);border-color:#f0c0c0}
.fb.nnek.on{background:var(--red);color:white}

/* ── Search box ── */
.search-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.search-wrap h2{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:14px;color:var(--text)}
.mode-row{display:flex;gap:6px;margin-bottom:13px;background:var(--surface2);border-radius:var(--radius);padding:3px}
.mb{flex:1;padding:7px 0;border-radius:7px;background:transparent;color:var(--text2);border:none;font-size:12px;font-weight:500;transition:all .15s}
.mb.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.search-hint{font-size:11px;color:var(--text3);margin-top:5px;font-style:italic}

/* ── Week menu stepper ── */
.stepper{display:inline-flex;align-items:center;gap:1px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stepper button{background:none;border:none;font-size:15px;color:var(--accent);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:background .15s}
.stepper button:hover{background:var(--border)}
.stepper span{font-size:13px;color:var(--text);min-width:28px;text-align:center;font-weight:600}

/* ── Shopping list ── */
.afd-header{display:flex;align-items:center;gap:8px;margin:16px 0 6px}
.afd-title{font-weight:600;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.afd-line{flex:1;height:1px;background:var(--border)}
.afd-count{font-size:11px;color:var(--text3)}
.sitem{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:4px;transition:all .15s;background:var(--surface)}
.sitem:hover{border-color:var(--border2)}
.sitem.done{opacity:.55}
.scb{width:19px;height:19px;border-radius:5px;flex-shrink:0;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;font-size:11px;color:white}
.scb.done{border-color:var(--accent);background:var(--accent)}
.sname{flex:1;font-size:13px;color:var(--text);cursor:pointer;line-height:1.3}
.sname.done{text-decoration:line-through;color:var(--text3)}
.sqty{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap}
.sdel{background:none;border:none;color:var(--border2);font-size:13px;padding:0 2px;cursor:pointer;transition:color .15s;flex-shrink:0}
.sdel:hover{color:var(--red)}
.done-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:16px}
.done-section h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px;cursor:pointer}
.done-items{display:flex;flex-direction:column;gap:3px}

/* ── Misc ── */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.box-info{background:var(--accent-bg);border:1px solid #f0c8a0;border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#7a3a0e}
.box-err{background:var(--red-bg);border:1px solid #f0c0c0;border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--red)}
.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:14px}
.empty span{font-size:36px;display:block;margin-bottom:10px}
.hint{text-align:center;padding:30px 20px;color:var(--text3);font-size:13px;font-style:italic}
/* ── Onboarding ── */
#ob-ovl{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.ob-kaart{background:var(--surface);border-radius:20px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.ob-illu{height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.ob-emoji{font-size:64px;line-height:1}
@keyframes ob-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ob-slide-fwd{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes ob-slide-back{from{transform:translateX(-40px);opacity:0}to{transform:none;opacity:1}}
@keyframes ob-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.ob-fwd{animation:ob-slide-fwd .28s cubic-bezier(.4,0,.2,1)}
.ob-back{animation:ob-slide-back .28s cubic-bezier(.4,0,.2,1)}
.ob-body{padding:24px 24px 20px}
.ob-stap-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.ob-titel{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.25}
.ob-tekst{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .2s}
.ob-dot.on{background:var(--accent);width:20px;border-radius:4px}
.ob-nav{display:flex;gap:10px}
.ob-mini-ui{background:var(--surface2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text2);margin-top:8px;border:1px solid var(--border)}
@keyframes spin{to{transform:rotate(360deg)}}
.laad-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 20px;color:var(--text3);font-size:13px}
.laad-cirkel{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
.sec-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:7px}

/* ── Vrienden ── */
.friend-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;box-shadow:var(--shadow)}
.friend-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.friend-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-bg);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--accent);flex-shrink:0}
.feed-auteur{font-size:11px;color:var(--text3);margin-bottom:4px;padding-left:2px}
.btn-like{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text2);padding:4px 8px;border-radius:20px;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-like:hover{background:var(--red-bg);color:var(--red)}
.btn-like.liked{color:var(--red)}
.prog-bar{display:flex;gap:6px;margin-bottom:14px}
.prog-seg{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background .3s}
.prog-seg.done{background:var(--accent)}
.divider{height:1px;background:var(--border);margin:14px 0}

/* Modal */
#mov{position:fixed;inset:0;background:rgba(10,8,4,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
#mov.open{display:flex}
#mbox{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:22px 20px 36px;width:100%;max-width:800px;box-shadow:var(--shadow-lg);max-height:88vh;overflow-y:auto}
.cat-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;margin:0 5px 6px 0;cursor:pointer;transition:all .15s}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.ak{background:var(--gold-bg);color:var(--gold);border-color:#e8d890}
.cat-btn.ac{background:var(--blue-bg);color:var(--blue);border-color:#c0cef0}

@media(max-width:540px){
  .cards-grid{grid-template-columns:1fr}
  #hdr h1{font-size:17px}
  .tb{padding:7px 10px;font-size:11px}
}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:baseline;gap:8px">
        <h1>Restaurant <span>'t Rijnsburgje</span></h1>
        <span style="font-size:16px">🍳</span>
      </div>
      <button onclick="startOnboarding()" title="Rondleiding" style="background:none;border:none;cursor:pointer;padding:4px;opacity:.6;color:#f5e6c8;font-size:18px;line-height:1">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
    </div>
    <div id="hdr-sub">laden...</div>
    <div id="tabs">
      <button class="tb on" onclick="setTab('recepten')">Recepten</button>
      <button class="tb" onclick="setTab('zoeken')">Ontdekken</button>
      <button class="tb" onclick="setTab('weekmenu')">Weekmenu</button>
      <button class="tb" onclick="setTab('boodschappen')">Boodschappen</button>
      <button class="tb" onclick="setTab('vrienden')">Vrienden</button>
    </div>
  </div>
</div>

<div id="content"></div>

<!-- Edit modal -->
<div id="mov" onclick="closeOvl(event)">
  <div id="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="font-family:'Playfair Display',serif;font-size:17px;color:var(--text)" id="mtitle">Label bewerken</h2>
      <button onclick="sluitModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1">✕</button>
    </div>
    <span class="sec-label">Keuken</span>
    <div id="m-k" style="display:flex;flex-wrap:wrap;margin-bottom:16px"></div>
    <span class="sec-label">Categorie</span>
    <div id="m-c" style="display:flex;flex-wrap:wrap;margin-bottom:16px"></div>
    <span class="sec-label">Tags</span>
    <div id="m-t" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px;min-height:20px"></div>
    <div style="display:flex;gap:7px;margin-bottom:16px">
      <input id="m-ti" class="inp" placeholder="Nieuwe tag..." onkeydown="if(event.key==='Enter')addMTag()" style="flex:1">
      <button class="btn btn-light" onclick="addMTag()">+ Tag</button>
    </div>
    <span class="sec-label">Bereidingstijd</span>
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Actieve tijd (min)</div>
        <input id="m-tb" class="inp" type="number" min="0" step="5" placeholder="bijv. 30">
      </div>
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Wachttijd (min)</div>
        <input id="m-tw" class="inp" type="number" min="0" step="5" placeholder="bijv. 60">
      </div>
    </div>
    <span class="sec-label">Notities</span>
    <textarea id="m-n" class="inp" style="min-height:70px" placeholder="Persoonlijke tips, aanpassingen..."></textarea>
    <button class="btn btn-dark btn-w" style="margin-top:14px" onclick="saveModal()">Opslaan</button>
  </div>
</div>

<script src="/supabase.js"></script>
<script>

function toSB(r){
  return{
    id:r.id,user_id:S.gebruiker?.id,
    title:r.titel,description:r.omschrijving||'',
    image_url:r.afbeelding&&!r.afbeelding.startsWith('blob:')?r.afbeelding:null,source_url:r.bron||null,
    ingredients:r.ingredienten||[],instructions:r.stappen||[],
    cuisine:r.keuken||null,category:r.categorie||null,
    tags:r.tags||[],servings:r.personen||4,
    rating:r.rating||null,notes:r.notities||null,
    is_public:r.publiek||false,
    prep_time:parseInt(r.tijdBereiding)||0,
    wait_time:parseInt(r.tijdWacht)||0,
  };
}
function fromSB(row){
  return{
    id:row.id,titel:row.title,omschrijving:row.description||'',
    afbeelding:row.image_url||'',bron:row.source_url||'',
    ingredienten:row.ingredients||[],stappen:row.instructions||[],
    keuken:row.cuisine||'',categorie:row.category||'',
    tags:row.tags||[],personen:row.servings||4,
    rating:row.rating||0,notities:row.notes||'',
    tijdBereiding:row.prep_time||0,tijdWacht:row.wait_time||0,
    opgeslagen:true,datum:row.created_at?row.created_at.split('T')[0]:'',
    publiek:row.is_public||false,eigenaarId:row.user_id,
  };
}
async function savRecept(r){
  if(!S.gebruiker){console.warn('savRecept: niet ingelogd, sla niet op');return;}
  const{error}=await DB.from('recipes').upsert(toSB(r));
  if(error)console.error('Opslaan mislukt:',error.message);
}

async function kopieerPubliek(id){
  const r=S.publiekeRecepten.find(x=>x.id===id)||S.menuReceptenMap[id];if(!r)return;
  const nieuwId=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():Date.now().toString(36);
  const kopie={...r,id:nieuwId,publiek:false,eigenaarId:S.gebruiker?.id,opgeslagen:true,datum:new Date().toISOString().split('T')[0]};
  S.recepten.unshift(kopie);
  render();
  await savRecept(kopie);
  alert(`"${r.titel}" is gekopieerd naar jouw recepten.`);
}

}

async function laadLikesVoor(ids){
  if(!ids.length||!S.gebruiker)return;
  const{data}=await DB.from('recipe_likes').select('recipe_id,user_id').in('recipe_id',ids);
  (data||[]).forEach(l=>{
    S.likeCounts[l.recipe_id]=(S.likeCounts[l.recipe_id]||0)+1;
    if(l.user_id===S.gebruiker.id)S.mijnLikes.add(l.recipe_id);
  });
}
async function laadFeed(){
  if(!S.gebruiker||S.ikVolg.length===0){S.feed=[];S.feedMenus=[];S.ladenFeed=false;rIP();return;}
  S.ladenFeed=true;rIP();
  const volgIds=S.ikVolg.map(p=>p.id);
  const{data}=await DB.from('recipes').select('*').in('user_id',volgIds).eq('is_public',true).order('created_at',{ascending:false}).limit(20);
  const profielMap={};S.ikVolg.forEach(p=>profielMap[p.id]=p.display_name);
  S.feed=(data||[]).map(r=>({...fromSB(r),auteursNaam:profielMap[r.user_id]||''}));
  if(data&&data.length)await laadLikesVoor(data.map(r=>r.id));
  await laadFeedMenus();
  S.ladenFeed=false;rIP();
}
async function toggleLike(recipeId){
  if(!S.gebruiker)return;
  if(S.mijnLikes.has(recipeId)){
    await DB.from('recipe_likes').delete().eq('recipe_id',recipeId).eq('user_id',S.gebruiker.id);
    S.mijnLikes.delete(recipeId);
    S.likeCounts[recipeId]=Math.max(0,(S.likeCounts[recipeId]||1)-1);
  }else{
    await DB.from('recipe_likes').insert({recipe_id:recipeId,user_id:S.gebruiker.id});
    S.mijnLikes.add(recipeId);
    S.likeCounts[recipeId]=(S.likeCounts[recipeId]||0)+1;
  }
  rIP();
}

function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sc(v,van,naar){const r=v*(naar/(van||4));return r%1===0?r:parseFloat(r.toFixed(1));}

// ── Weekmenu Supabase ─────────────────────────────────────────────────────────
function getMaandag(){
  const d=new Date();const dag=d.getDay()||7;
  const m=new Date(d);m.setDate(d.getDate()-(dag-1));m.setHours(0,0,0,0);
  return m.toISOString().split('T')[0];
}
function getVolgendeWeek(){
  const d=new Date(getMaandag()+'T00:00:00');
  d.setDate(d.getDate()+7);
  return d.toISOString().split('T')[0];
}
function formatMaandag(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
}
function weekLabel(maandag){
  const nu=getMaandag();
  const diff=Math.round((new Date(maandag+'T00:00:00')-new Date(nu+'T00:00:00'))/(7*24*3600*1000));
  if(diff===0)return'Deze week';
  if(diff===1)return'Volgende week';
  if(diff===-1)return'Vorige week';
  if(diff>1)return`Over ${diff} weken`;
  return`${-diff} weken geleden`;
}
function formatWeekBereik(maandag){
  const d=new Date(maandag+'T00:00:00');
  const z=new Date(d);z.setDate(d.getDate()+6);
  const fmt=dt=>dt.toLocaleDateString('nl-NL',{day:'numeric',month:'long'});
  return`${fmt(d)} – ${fmt(z)} ${z.getFullYear()}`;
}
function verschuifWeek(delta){
  const d=new Date((S.actieveWeek||getMaandag())+'T00:00:00');
  d.setDate(d.getDate()+delta*7);
  wisselWeek(d.toISOString().split('T')[0]);
}
async function wisselWeek(nieuweWeek){
  S.actieveWeek=nieuweWeek;
  S.menuId=null;S.lijstId=null;
  S.geselecteerd=[];S.weekPers={};
  S.shopItems=[];S.extraItems=[];
  sav();render();
  await laadWeekmenu();
  await laadBoodschappen();
  render();
}
async function laadWeekmenu(){
  if(!S.gebruiker)return;
  const{data:menu}=await DB.from('week_menus').select('id,is_public').eq('user_id',S.gebruiker.id).eq('week_start',S.actieveWeek).maybeSingle();
  if(!menu){S.menuId=null;S.weekMenuPubliek=false;S.geselecteerd=[];S.weekPers={};return;}
  S.menuId=menu.id;S.weekMenuPubliek=menu.is_public||false;
  const{data:items}=await DB.from('week_menu_items').select('recipe_id,servings').eq('menu_id',menu.id).order('day_of_week');
  S.geselecteerd=(items||[]).map(i=>i.recipe_id);
  S.weekPers={};
  (items||[]).forEach(i=>{if(i.servings)S.weekPers[i.recipe_id]=i.servings;});
}
async function slaWeekmenuOp(){
  if(!S.gebruiker)return;
  let menuId=S.menuId;
  if(!menuId){
    const{data:bestaand}=await DB.from('week_menus').select('id').eq('user_id',S.gebruiker.id).eq('week_start',S.actieveWeek).maybeSingle();
    if(bestaand){menuId=bestaand.id;}
    else{
      const{data:nieuw,error}=await DB.from('week_menus').insert({user_id:S.gebruiker.id,week_start:S.actieveWeek,is_public:S.weekMenuPubliek}).select('id').single();
      if(error){console.error('Weekmenu aanmaken mislukt:',error.message);return;}
      menuId=nieuw.id;
    }
    S.menuId=menuId;
  }
  await DB.from('week_menu_items').delete().eq('menu_id',menuId);
  const teInserten=S.geselecteerd.filter(rid=>!rid.startsWith('demo-'));
  if(teInserten.length>0){
    const{error}=await DB.from('week_menu_items').insert(
      teInserten.map((rid,i)=>({menu_id:menuId,recipe_id:rid,day_of_week:i,servings:S.weekPers[rid]||null}))
    );
    if(error)console.error('Weekmenu opslaan mislukt:',error.message);
  }
}
async function resetWeekmenu(){
  if(S.menuId)await DB.from('week_menu_items').delete().eq('menu_id',S.menuId);
  S.geselecteerd=[];S.weekPers={};S.shopItems=[];S.extraItems=[];
  sav();render();
}
async function toggleWeekMenuPubliek(){
  S.weekMenuPubliek=!S.weekMenuPubliek;
  if(S.menuId){
    await DB.from('week_menus').update({is_public:S.weekMenuPubliek}).eq('id',S.menuId);
  } else if(S.weekMenuPubliek){
    // Geen recepten geselecteerd maar toch publiek willen? Maak leeg menu aan.
    const{data:bestaand}=await DB.from('week_menus').select('id').eq('user_id',S.gebruiker.id).eq('week_start',S.actieveWeek).maybeSingle();
    if(bestaand){S.menuId=bestaand.id;await DB.from('week_menus').update({is_public:true}).eq('id',bestaand.id);}
    else{
      const{data:nieuw}=await DB.from('week_menus').insert({user_id:S.gebruiker.id,week_start:S.actieveWeek,is_public:true}).select('id').single();
      if(nieuw)S.menuId=nieuw.id;
    }
  }
  rIP();
}
async function laadFeedMenus(){
  if(!S.gebruiker||!S.ikVolg.length){S.feedMenus=[];return;}
  const volgIds=S.ikVolg.map(p=>p.id);
  const{data:menus}=await DB.from('week_menus').select('id,user_id').in('user_id',volgIds).eq('is_public',true).eq('week_start',getMaandag());
  if(!menus||!menus.length){S.feedMenus=[];rIP();return;}
  const profielMap={};S.ikVolg.forEach(p=>profielMap[p.id]=p.display_name);
  const resultaten=await Promise.all(menus.map(async menu=>{
    const{data:items}=await DB.from('week_menu_items')
      .select('recipe_id,recipes(id,title,description,image_url,ingredients,instructions,cuisine,category,tags,servings,source_url,is_public,user_id)')
      .eq('menu_id',menu.id).order('day_of_week');
    const recepten=(items||[]).filter(i=>i.recipes).map(i=>fromSB(i.recipes));
    recepten.forEach(r=>{S.menuReceptenMap[r.id]=r;});
    return{menuId:menu.id,userId:menu.user_id,naam:profielMap[menu.user_id]||'',recepten};
  }));
  S.feedMenus=resultaten.filter(m=>m.recepten.length>0);
  rIP();
}

async function setRating(id,v){const r=S.recepten.find(x=>x.id===id);if(r){r.rating=v;render();await savRecept(r);}}
async function delRec(id){
  const backup=S.recepten.find(r=>r.id===id);
  S.recepten=S.recepten.filter(r=>r.id!==id);
  S.geselecteerd=S.geselecteerd.filter(x=>x!==id);
  delete S.weekPers[id];
  render();
  if(!S.gebruiker)return;
  // Poging 1: met user_id filter
  let{data,error}=await DB.from('recipes').delete().eq('id',id).eq('user_id',S.gebruiker.id).select('id');
  // Poging 2: zonder user_id filter (voor recepten opgeslagen zonder user_id)
  if(!error&&(!data||data.length===0)){
    ({data,error}=await DB.from('recipes').delete().eq('id',id).select('id'));
  }

// ── API — robust JSON extraction ──────────────────────────────────────────────
function extractJSON(txt){
  // Try to find JSON array, handle markdown fences and extra text
  let clean=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
  // Find outermost array
  let depth=0,start=-1,end=-1;
  for(let i=0;i<clean.length;i++){
    if(clean[i]==='['){if(start===-1)start=i;depth++;}
    else if(clean[i]===']'){depth--;if(depth===0){end=i;break;}}
  }
  if(start===-1||end===-1)throw new Error('Geen JSON array gevonden in antwoord');
  const slice=clean.slice(start,end+1);
  try{return JSON.parse(slice);}
  catch(e){
    // Try to fix common issues: unescaped quotes, trailing commas
    const fixed=slice.replace(/,\s*([}\]])/g,'$1').replace(/(['"])?([a-zA-Z0-9_]+)(['"])?:/g,'"$2":');
    return JSON.parse(fixed);
  }
}

async function callAPI(messages,search=false,maxTokens=1200,sysOverride=null){
  const sys=(sysOverride||SYS).replace('DATUM',new Date().toISOString().split('T')[0]);
  const body={model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system:sys,messages};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const resp=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok){
    if(resp.status===429)throw new Error('Te veel verzoeken — wacht even en probeer opnieuw');
    throw new Error('API fout: '+resp.status);
  }
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||'API fout');
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!txt)throw new Error('Geen antwoord ontvangen');
  return extractJSON(txt);
}

    tags:r.tags||[],keuken:r.keuken||'',categorie:r.categorie||'',

  }));
}
function fmtMin(m){
  if(!m||m<=0)return'';
  if(m<60)return m+'min';
  const u=Math.floor(m/60),rest=m%60;
  return rest?`${u}u${rest}`:`${u}u`;
}
function tijdSticker(r){
  const b=parseInt(r.tijdBereiding)||0;
  const w=parseInt(r.tijdWacht)||0;
  if(!b&&!w)return'';
  if(b&&w)return`⏱ ${fmtMin(b)}+${fmtMin(w)}`;
  return`⏱ ${fmtMin(b||w)}`;
}

      afbeelding:sr.afbeelding||pd.image||'',rating:0,opgeslagen:false,datum,
    };
  }
  if(!pd.text||pd.text.length<100)return null;
  try{
    const parsed=await callAPI([{role:'user',content:`Haal het recept uit deze tekst. Bron URL: ${url}\n\n${pd.text.slice(0,8000)}`}],false,2000,SYS_URL);

  }catch{return null;}
}

  let gevonden=0;
  await Promise.all(kandidaten.map(async link=>{
    if(gevonden>=max)return;
    const recept=await importeerAlsRecept(link.url);
    if(recept&&gevonden<max){

      render();
    }
  }));
}

      false,150,sys

    // Stap 2: Zoek beide termen parallel via DuckDuckGo
    const [links1,links2]=await Promise.all(
      zoektermen.slice(0,2).map(async term=>{
        const r=await fetch('/fetch?mode=ddg&q='+encodeURIComponent(term));
        if(!r.ok)return[];
        const d=await r.json();
        return d.links||[];
      })
    );

    // Stap 3: Importeer 1 recept per term
    await Promise.all([
      links1.length?autoImportTopLinks(links1,2):Promise.resolve(),
      links2.length?autoImportTopLinks(links2,2):Promise.resolve(),
    ]);

    if(!S.resultaten.length)S.fout='Geen recepten gevonden op de sites. Probeer opnieuw of pas filters aan.';
  }catch(e){S.fout=e.message;}
  finally{S.laden=false;render();}
}

      const file=item.getAsFile();if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{S.handmatigeAfbeelding=ev.target.result.split(',')[1];S.handmatigeAfbeeldingType=file.type||'image/jpeg';rIP();};
      reader.readAsDataURL(file);return;
    }
  }
}
async function verwerkTekst(){
  const tekst=S.handmatigeTekst.trim();
  const heeftFoto=!!S.handmatigeAfbeelding;
  if(!heeftFoto&&tekst.length<30){S.fout='Plak een recept of typ wat meer tekst';rIP();return;}
  S.laden=true;S.fout='';S.resultaten=[];render();
  try{
    const titelHint=S.handmatigeTitel.trim()?`De titel is: "${S.handmatigeTitel.trim()}". `:'';
    const bronHint=S.handmatigeUrl.trim()?`\nBron URL: ${S.handmatigeUrl.trim()}`:'';
    let content;
    if(heeftFoto){
      content=[{type:'image',source:{type:'base64',media_type:S.handmatigeAfbeeldingType,data:S.handmatigeAfbeelding}}];
      content.push({type:'text',text:tekst?`${titelHint}Gebruik de afbeelding en de onderstaande tekst om het recept te reconstrueren.${bronHint}\n\n${tekst.slice(0,8000)}`:`${titelHint}Haal het recept uit de afbeelding.${bronHint}`});
    }else{
      content=`${titelHint}Haal het recept uit deze tekst.${bronHint}\n\n${tekst.slice(0,8000)}`;
    }
    const parsed=await callAPI([{role:'user',content}],false,2000,heeftFoto?SYS_FOTO:SYS_URL);
    if(!Array.isArray(parsed)||!parsed.length)throw new Error('Geen recept gevonden');
    S.resultaten=normaliseer(parsed,S.handmatigeUrl.trim()||'');
    if(S.handmatigeTitel.trim()&&S.resultaten[0]&&!S.resultaten[0].titel)S.resultaten[0].titel=S.handmatigeTitel.trim();
  }catch(e){S.fout=e.message;}
  finally{S.laden=false;render();}
}

async function verwerkFoto(input){
  const file=input.files[0];if(!file)return;
  S.laden=true;S.fout='';S.resultaten=[];render();
  try{
    const fotoUrl=URL.createObjectURL(file);
    const base64=await new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result.split(',')[1]);
      reader.onerror=rej;
      reader.readAsDataURL(file);
    });

    const parsed=await callAPI([{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:base64}},
      {type:'text',text:'Lees dit recept visueel uit de afbeelding. Verwerk gedraaide tekst en meerdere kolommen correct. Haal alle ingrediënten met hoeveelheden en alle bereidingsstappen eruit. Geef JSON array met 1 recept.'},
    ]}],false,2000,SYS_FOTO);

    if(!Array.isArray(parsed)||!parsed.length)throw new Error('Geen recept gevonden in de afbeelding');
    S.resultaten=normaliseer(parsed,'');
    if(S.resultaten[0])S.resultaten[0].afbeelding=fotoUrl;
  }catch(e){S.fout=e.message;}
  finally{S.laden=false;render();}
}

// ── Boodschappen ──────────────────────────────────────────────────────────────
function bouwShop(){
  const sel=S.recepten.filter(r=>S.geselecteerd.includes(r.id));
  const map={};
  sel.forEach(r=>{
    const p=gP(r.id);
    (r.ingredienten||[]).forEach(ing=>{
      const k=ing.naam.toLowerCase().trim();
      const hv=parseFloat((ing.hoeveelheid*(p/(r.personen||4))).toFixed(1));
      const uk=map[k]&&map[k].eenheid!==ing.eenheid?k+'_'+ing.eenheid:k;
      if(map[uk]&&map[uk].eenheid===ing.eenheid)map[uk].hoeveelheid=parseFloat((map[uk].hoeveelheid+hv).toFixed(1));
      else map[uk]={naam:ing.naam,hoeveelheid:hv,eenheid:ing.eenheid,done:false,afd:getAfd(ing.naam),extra:false};
    });
  });
  const items=Object.values(map);
  items.forEach(ni=>{const o=S.shopItems.find(x=>x.naam.toLowerCase()===ni.naam.toLowerCase()&&x.eenheid===ni.eenheid&&!x.extra);if(o)ni.done=o.done;});
  S.shopItems=[...items,...S.extraItems.map(e=>({...e,afd:e.afd||getAfd(e.naam)}))];
}
async function maakBoodschappenlijst(){
  bouwShop();setTab('boodschappen');
  if(S.gebruiker&&S.menuId)await slaBoodschappenlijstOp();
}
async function slaBoodschappenlijstOp(){
  const{data:bestaand}=await DB.from('shopping_lists').select('id').eq('user_id',S.gebruiker.id).eq('menu_id',S.menuId).maybeSingle();
  let lijstId;
  if(bestaand){
    lijstId=bestaand.id;
    await DB.from('shopping_items').delete().eq('list_id',lijstId);
  }else{
    const{data:nieuw,error}=await DB.from('shopping_lists').insert({user_id:S.gebruiker.id,menu_id:S.menuId}).select('id').single();
    if(error){console.error(error.message);return;}
    lijstId=nieuw.id;
  }
  S.lijstId=lijstId;
  if(S.shopItems.length>0){
    await DB.from('shopping_items').insert(S.shopItems.map((item,i)=>({
      list_id:lijstId,name:item.naam,
      amount:`${item.hoeveelheid}${item.eenheid?' '+item.eenheid:''}`,
      department:item.afd||'Overig',is_checked:item.done||false,
      sort_order:item.extra?1000+i:i,
    })));
  }
  await herlaadBoodschappen(lijstId);
  abonneer(lijstId);
}
async function herlaadBoodschappen(lijstId){
  const{data}=await DB.from('shopping_items').select('*').eq('list_id',lijstId).order('sort_order');
  if(!data)return;
  S.shopItems=data.map(i=>{
    const m=(i.amount||'').match(/^([\d.]+)\s*(.*)$/);
    return{naam:i.name,hoeveelheid:m?parseFloat(m[1]):1,eenheid:m?(m[2]||'').trim():'',done:i.is_checked,extra:i.sort_order>=1000,afd:i.department||'Overig',sbId:i.id};
  });
  S.extraItems=S.shopItems.filter(i=>i.extra);
  rIP();
}
async function laadBoodschappen(){
  if(!S.gebruiker||!S.menuId)return;
  const{data:list}=await DB.from('shopping_lists').select('id').eq('user_id',S.gebruiker.id).eq('menu_id',S.menuId).maybeSingle();
  if(!list)return;
  S.lijstId=list.id;
  await herlaadBoodschappen(list.id);
  abonneer(list.id);
}
async function ensureLijstId(){
  if(S.lijstId)return S.lijstId;
  if(!S.gebruiker)return null;
  if(!S.menuId){
    const{data:bestaand}=await DB.from('week_menus').select('id').eq('user_id',S.gebruiker.id).eq('week_start',S.actieveWeek).maybeSingle();
    if(bestaand)S.menuId=bestaand.id;
    else{
      const{data:nieuw}=await DB.from('week_menus').insert({user_id:S.gebruiker.id,week_start:S.actieveWeek}).select('id').single();
      if(nieuw)S.menuId=nieuw.id;
    }
  }
  if(!S.menuId)return null;
  const{data:bestaand}=await DB.from('shopping_lists').select('id').eq('user_id',S.gebruiker.id).eq('menu_id',S.menuId).maybeSingle();
  if(bestaand){S.lijstId=bestaand.id;abonneer(bestaand.id);return S.lijstId;}
  const{data:nieuw}=await DB.from('shopping_lists').insert({user_id:S.gebruiker.id,menu_id:S.menuId}).select('id').single();
  if(nieuw){S.lijstId=nieuw.id;abonneer(nieuw.id);}
  return S.lijstId||null;
}
async function bewaarVoorVolgendeWeek(){
  const items=S.extraItems.filter(i=>!i.done);
  if(!items.length){alert('Geen handmatige items om te bewaren.');return;}
  if(!S.gebruiker)return;
  const aw=new Date((S.actieveWeek||getMaandag())+'T00:00:00');
  aw.setDate(aw.getDate()+7);
  const vMaandag=aw.toISOString().split('T')[0];
  let menuId;
  const{data:em}=await DB.from('week_menus').select('id').eq('user_id',S.gebruiker.id).eq('week_start',vMaandag).maybeSingle();
  if(em)menuId=em.id;
  else{
    const{data:nm}=await DB.from('week_menus').insert({user_id:S.gebruiker.id,week_start:vMaandag}).select('id').single();
    menuId=nm?.id;
  }
  if(!menuId)return;
  let lijstId;
  const{data:el}=await DB.from('shopping_lists').select('id').eq('user_id',S.gebruiker.id).eq('menu_id',menuId).maybeSingle();
  if(el)lijstId=el.id;
  else{
    const{data:nl}=await DB.from('shopping_lists').insert({user_id:S.gebruiker.id,menu_id:menuId}).select('id').single();
    lijstId=nl?.id;
  }
  if(!lijstId)return;
  await DB.from('shopping_items').insert(
    items.map((item,i)=>({list_id:lijstId,name:item.naam,amount:`${item.hoeveelheid}${item.eenheid?' '+item.eenheid:''}`,department:item.afd||'Overig',is_checked:false,sort_order:1000+i}))
  );
  alert(`${items.length} item${items.length===1?'':'s'} bewaard voor de week van ${formatMaandag(vMaandag)}.`);
}
let realtimeSub=null;
function abonneer(lijstId){
  if(realtimeSub){DB.removeChannel(realtimeSub);realtimeSub=null;}
  realtimeSub=DB.channel('lijst-'+lijstId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'shopping_items',filter:`list_id=eq.${lijstId}`},
      payload=>{const item=S.shopItems.find(i=>i.sbId===payload.new.id);if(item){item.done=payload.new.is_checked;rIP();}}
    ).subscribe();
}
function toggleShop(idx){
  if(S.shopItems[idx]===undefined)return;
  S.shopItems[idx].done=!S.shopItems[idx].done;
  const sbId=S.shopItems[idx].sbId;
  if(sbId)DB.from('shopping_items').update({is_checked:S.shopItems[idx].done}).eq('id',sbId).then(({error})=>{if(error)console.error(error.message);});
  rIP();
}
function delShop(idx){
  const item=S.shopItems[idx];
  if(item?.sbId)DB.from('shopping_items').delete().eq('id',item.sbId).then(({error})=>{if(error)console.error(error.message);});
  S.shopItems.splice(idx,1);
  if(item?.extra)S.extraItems=S.extraItems.filter(e=>e!==item);
  rIP();
}
async function addExtra(){
  const n=document.getElementById('en')?.value?.trim();if(!n)return;
  const hv=parseFloat(document.getElementById('ehv')?.value)||1;
  const een=document.getElementById('eee')?.value?.trim()||'st';
  const item={naam:n,hoeveelheid:hv,eenheid:een,done:false,extra:true,afd:getAfd(n)};
  S.extraItems.push(item);S.shopItems.push(item);
  document.getElementById('en').value='';document.getElementById('ehv').value='';document.getElementById('eee').value='';
  rIP();
  if(S.gebruiker){
    const lijstId=await ensureLijstId();
    if(lijstId){
      const{data,error}=await DB.from('shopping_items').insert({
        list_id:lijstId,name:n,amount:`${hv}${een?' '+een:''}`,
        department:item.afd,is_checked:false,sort_order:1000+S.extraItems.length,
      }).select('id').single();
      if(!error&&data)item.sbId=data.id;
    }
  }
}

  (r.tags||[]).forEach(t=>s+=`<span class="lbl lbl-t">${h(t)}</span>`);
  return s+'</div>';
}
function buildStars(rating,id){return'<div class="stars">'+[1,2,3,4,5].map(n=>`<span class="star${n<=rating?' on':''}" onclick="setRating('${id}',${n})">★</span>`).join('')+'</div>';}

function renderBoodschappen(){

  const actief=S.shopItems.filter(i=>!i.done);
  const done=S.shopItems.filter(i=>i.done);
  const sRec=S.recepten.filter(r=>S.geselecteerd.includes(r.id));

  // Groepeer actieve items per afdeling
  const groepen=AFDS.map(a=>({...a,items:S.shopItems.map((x,i)=>({...x,idx:i})).filter(x=>!x.done&&x.afd===a.n)})).filter(g=>g.items.length>0);

  const aw=S.actieveWeek||getMaandag();

    ${sRec.length>0?`<div style="font-size:12px;color:var(--text2);margin-bottom:14px">${sRec.map(r=>`<strong>${h(r.titel)}</strong> (${gP(r.id)} pers.)`).join(' + ')}</div>`:''}

        <button class="btn btn-accent" onclick="addExtra()" style="white-space:nowrap">+ Voeg toe</button>

    <!-- Actieve items per afdeling -->
    ${groepen.length===0&&actief.length===0?'<div class="hint">Alle boodschappen zijn afgevinkt 🎉</div>':''}
    ${groepen.map(g=>`
      <div>
        <div class="afd-header">
          <span class="afd-title">${g.e} ${g.n}</span>
          <div class="afd-line"></div>
          <span class="afd-count">${g.items.length}</span>
        </div>
        ${g.items.map(item=>`
          <div class="sitem" style="background:${g.k}">
            <div class="scb" onclick="toggleShop(${item.idx})">${item.done?'✓':''}</div>

    ${done.length>0?`

function toggleWW(btn){
  const inp=btn.previousElementSibling;
  const toon=inp.type==='password';
  inp.type=toon?'text':'password';
  const svg=btn.querySelector('svg');
  if(toon){
    svg.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    svg.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
async function registreer(){
  const naam=document.getElementById('reg-naam')?.value?.trim();
  const email=document.getElementById('reg-email')?.value?.trim();
  const ww=document.getElementById('reg-ww')?.value;
  if(!naam){S.authFout='Vul je naam in';rIP();return;}
  if(!email){S.authFout='Vul je e-mailadres in';rIP();return;}
  if(!ww||ww.length<6){S.authFout='Wachtwoord moet minimaal 6 tekens zijn';rIP();return;}
  S.authLaden=true;S.authFout='';rIP();
  try{
    const{data,error}=await DB.auth.signUp({email,password:ww});
    if(error)throw error;
    const username=naam.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').slice(0,20)+'-'+Date.now().toString(36);
    const{error:pe}=await DB.from('profiles').insert({id:data.user.id,username,display_name:naam});
    if(pe)throw pe;
    S.gebruiker=data.user;S.profiel={display_name:naam};
    await lod();S.scherm='app';render();
    await verwerkPendingVolg();
    startOnboarding();
  }catch(e){S.authFout=e.message||'Er ging iets mis';}
  finally{S.authLaden=false;render();}
}

async function login(){
  const email=document.getElementById('log-email')?.value?.trim();
  const ww=document.getElementById('log-ww')?.value;
  if(!email||!ww){S.authFout='Vul e-mail en wachtwoord in';rIP();return;}
  S.authLaden=true;S.authFout='';rIP();
  try{
    const{data,error}=await DB.auth.signInWithPassword({email,password:ww});
    if(error)throw error;
    S.gebruiker=data.user;
    const{data:p}=await DB.from('profiles').select('display_name').eq('id',data.user.id).single();
    S.profiel=p||{display_name:email};
    await lod();S.scherm='app';render();
    await verwerkPendingVolg();
  }catch(e){S.authFout=e.message==='Invalid login credentials'?'E-mail of wachtwoord klopt niet':e.message||'Er ging iets mis';}
  finally{S.authLaden=false;render();}
}

}

function stapOnboarding(delta){
  const nieuw=S.onboardingStap+delta;
  if(nieuw<0||nieuw>=OB_STAPPEN.length)return;
  S.onboardingRichting=delta>0?'fwd':'back';
  S.onboardingStap=nieuw;
  renderOnboardingOverlay();
}

function sluitOnboarding(naarOntdekken=false){
  document.getElementById('ob-ovl')?.remove();
  S.onboarding=false;
  if(naarOntdekken){S.tab='zoeken';render();}
}

function renderOnboardingOverlay(){
  const stap=OB_STAPPEN[S.onboardingStap];
  const totaal=OB_STAPPEN.length;
  const isLaatste=S.onboardingStap===totaal-1;
  const isEerste=S.onboardingStap===0;
  const richting=S.onboardingRichting;

  const dots=OB_STAPPEN.map((_,i)=>`<div class="ob-dot${i===S.onboardingStap?' on':''}"></div>`).join('');

  const html=`
    <div id="ob-ovl" onclick="if(event.target===this)sluitOnboarding()">
      <div class="ob-kaart">
        <div class="ob-illu" style="background:${stap.kleur}">
          <div class="${richting==='fwd'?'ob-fwd':'ob-back'}" style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%">
            ${stap.illu}
          </div>
        </div>
        <div class="ob-body">
          <div class="${richting==='fwd'?'ob-fwd':'ob-back'}">
            ${stap.tab?`<div class="ob-stap-label">Tab: ${stap.tab}</div>`:`<div class="ob-stap-label">Stap ${S.onboardingStap+1} van ${totaal}</div>`}
            <div class="ob-titel">${stap.titel}</div>
            <div class="ob-tekst">${stap.tekst}</div>
          </div>
          <div class="ob-dots">${dots}</div>
          <div class="ob-nav">
            ${!isEerste?`<button class="btn btn-ghost" onclick="stapOnboarding(-1)" style="flex:1">← Vorige</button>`:`<button class="btn btn-ghost" onclick="sluitOnboarding()" style="flex:1">Overslaan</button>`}
            ${isLaatste
              ?`<button class="btn btn-accent" onclick="sluitOnboarding(true)" style="flex:2">Ga naar Ontdekken →</button>`
              :`<button class="btn btn-accent" onclick="stapOnboarding(1)" style="flex:2">${isEerste?'Rondleiding starten →':'Volgende →'}</button>`}
          </div>
        </div>
      </div>
    </div>`;

  const bestaand=document.getElementById('ob-ovl');
  if(bestaand){bestaand.outerHTML=html;}
  else{document.body.insertAdjacentHTML('beforeend',html);}
}

function startOnboarding(){
  S.onboarding=true;S.onboardingStap=0;S.onboardingRichting='fwd';
  renderOnboardingOverlay();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const hdr=document.getElementById('hdr');
  if(S.scherm!=='app'){
    hdr.style.display='none';
    document.getElementById('content').innerHTML=renderAuth();
    return;
  }
  hdr.style.display='';
  const naam=S.profiel?.display_name||S.gebruiker?.email||'';
  document.getElementById('hdr-sub').innerHTML=`${h(naam)} &middot; ${S.recepten.length} recepten <a href="#" onclick="uitloggen();return false" style="color:var(--text3);font-size:10px;margin-left:8px">uitloggen</a>`;
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',['recepten','zoeken','weekmenu','boodschappen','vrienden'][i]===S.tab));
  let html='';
  if(S.tab==='recepten')html=renderRecepten();
  else if(S.tab==='zoeken')html=renderZoeken();
  else if(S.tab==='weekmenu')html=renderWeekmenu();
  else if(S.tab==='boodschappen')html=renderBoodschappen();
  else if(S.tab==='vrienden')html=renderVrienden();
  document.getElementById('content').innerHTML=html;
}

async function importeerLink(url){
  S.zoekUrl=url;S.laden=true;S.fout='';S.resultaten=[];S.ontdekTab='url';render();
  try{
    const pr=await fetch('/fetch?url='+encodeURIComponent(url));
    if(!pr.ok){const e=await pr.json().catch(()=>({}));throw new Error(e?.error||'Kon pagina niet ophalen');}
    const pd=await pr.json();
    if(pd.schema_recept){
      const sr=pd.schema_recept;
      const datum=new Date().toISOString().split('T')[0];
      S.resultaten=[{
        id:'r'+Date.now()+Math.random().toString(36).slice(2),
        titel:sr.titel||'Recept',omschrijving:sr.omschrijving||'',
        personen:sr.personen||4,ingredienten:sr.ingredienten||[],stappen:sr.stappen||[],
        keuken:sr.keuken||'',categorie:'',tags:[],notities:'',bron:url,
        afbeelding:sr.afbeelding||pd.image||'',rating:0,opgeslagen:false,datum,
      }];
      return;
    }
    if(!pd.text||pd.text.length<100)throw new Error('Pagina bevat te weinig tekst');
    const parsed=await callAPI([{role:'user',content:`Haal het recept uit deze tekst. Bron URL: ${url}\n\n${pd.text.slice(0,8000)}`}],false,2000,SYS_URL);
    if(pd.image&&parsed[0])parsed[0].afbeelding=pd.image;
    if(!Array.isArray(parsed)||!parsed.length)throw new Error('Geen recept gevonden');
    S.resultaten=normaliseer(parsed,url);
  }catch(e){S.fout=e.message;}
  finally{S.laden=false;render();}
}
function rIP(){const y=window.scrollY;bewaarZoekVelden();render();window.scrollTo(0,y);}
